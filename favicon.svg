<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35"/>
      <stop offset="100%" style="stop-color:#0d1020"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f9cf9"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Checkmark -->
  <polyline points="7,15 13,21 25,9" fill="none" stroke="url(#checkGrad)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- "Ops" text -->
  <text x="16" y="30" text-anchor="middle" font-family="Georgia, serif" font-weight="700"
    font-size="7" fill="#ffffff" letter-spacing="0.3">Ops</text>
</svg>
