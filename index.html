// ── FIRESTORE STORE ──
// All data lives under a single document per key in the "tracker" collection.
const store = {
  get: async (key) => {
    try {
      const doc = await db.collection("tracker").doc(key).get();
      return doc.exists ? doc.data().value : null;
    } catch(e) { console.warn("store.get error", key, e); return null; }
  },
  set: async (key, val) => {
    try {
      await db.collection("tracker").doc(key).set({ value: val });
    } catch(e) { console.warn("store.set error", key, e); }
  },
  // Subscribe to real-time updates for a key
  subscribe: (key, callback) => {
    return db.collection("tracker").doc(key).onSnapshot(doc => {
      callback(doc.exists ? doc.data().value : null);
    });
  }
};

function taskAppearsOnDay(t,day){
  if(t.freq==="custom") return (t.customDays||[]).includes(day);
  return (FREQ_DAYS[t.freq]||DAYS).includes(day);
}
function extractStartTime(slotStr){
  if(!slotStr) return slotStr;
  const dash=slotStr.indexOf("–");
  if(dash===-1) return slotStr.trim();
  const left=slotStr.slice(0,dash).trim();
  const right=slotStr.slice(dash+1).trim();
  if(!/[aApP][mM]/.test(left)){
    const ampm=right.match(/[aApP][mM]/)?.[0]||"";
    const lh=parseInt(left.split(":")[0]),rh=parseInt(right.split(":")[0]);
    if(ampm==="PM"&&lh!==12&&(rh===12||lh>rh)) return left+" AM";
    return left+" "+ampm;
  }
  return left;
}
function generateWeeks(startDate,endDate){
  const weeks=[];
  let cursor=new Date(startDate); cursor.setHours(0,0,0,0);
  const end=new Date(endDate); end.setHours(23,59,59,999);
  while(cursor<=end){
    const mon=new Date(cursor); mon.setDate(mon.getDate()+1);
    const fri=new Date(cursor); fri.setDate(fri.getDate()+5);
    const fmt=d=>d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    weeks.push({label:`${fmt(mon)} – ${fmt(fri)}`,startSunday:new Date(cursor),mon:new Date(mon)});
    cursor.setDate(cursor.getDate()+7);
  }
  return weeks;
}

function getTodayDayName(){ return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()]; }
function getCurrentWeekIdx(){
  const now=new Date();
  for(let i=ALL_WEEKS.length-1;i>=0;i--){
    const sun=ALL_WEEKS[i].startSunday,sat=new Date(sun); sat.setDate(sat.getDate()+6);
    if(now>=sun&&now<=sat) return i;
  }
  return 0;
}

function buildDayTasks(allTasks,day,override){
  const base=allTasks.filter(t=>taskAppearsOnDay(t,day));
  const removed=new Set(override?.removed||[]);
  const slotOverrides=override?.slotOverrides||{};
  const result=base.filter(t=>!removed.has(t.id)).map(t=>slotOverrides[t.id]?{...t,time:slotOverrides[t.id]}:t);
  return [...result,...(override?.added||[])];
}

function buildCSV(weekIdx,day,tasks,checkedSet,notes){
  const week=ALL_WEEKS[weekIdx];
  const dayDate=new Date(week.mon); dayDate.setDate(dayDate.getDate()+DAYS.indexOf(day));
  const dateStr=dayDate.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  const q=v=>`"${String(v).replace(/"/g,'""')}"`;
  const done=tasks.filter(t=>checkedSet.has(t.id)).length;
  const rows=[
    [q("Day"),q(DAY_FULL[day])].join(","),
    [q("Date"),q(dateStr)].join(","),
    [q("Week of"),q(week.label)].join(","),
    [q("Completion"),q(`${done} of ${tasks.length} (${tasks.length?Math.round(done/tasks.length*100):0}%)`)].join(","),
    ",",[q("Start Time"),q("Task"),q("Completed")].join(","),
  ];
  const seen={},groups=[];
  tasks.forEach(t=>{if(!seen[t.time]){seen[t.time]=true;groups.push(t.time);}});
  groups.forEach(time=>{
    const start=extractStartTime(time);
    tasks.filter(t=>t.time===time).forEach((t,i)=>{
      rows.push([i===0?q(start):q(""),q(t.label),q(checkedSet.has(t.id)?"TRUE":"FALSE")].join(","));
    });
  });
  if(notes?.trim()) rows.push(",",[q("Notes"),q(notes.trim()),q("")].join(","));
  return rows.join("\r\n");
}
function buildTxt(weekIdx,day,tasks,checkedSet,notes){
  const week=ALL_WEEKS[weekIdx];
  const dayDate=new Date(week.mon); dayDate.setDate(dayDate.getDate()+DAYS.indexOf(day));
  const dateStr=dayDate.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  const done=tasks.filter(t=>checkedSet.has(t.id)).length;
  const pct=tasks.length?Math.round(done/tasks.length*100):0;
  const HR="─".repeat(52);
  const seen={},groups=[];
  tasks.forEach(t=>{if(!seen[t.time]){seen[t.time]=true;groups.push(t.time);}});
  const lines=["CORNERSTONE HEALING CENTER — PHOENIX OUTPATIENT","IAR Lead · Daily Summary",HR,
    `Date:         ${dateStr}`,`Week:         ${week.label}`,
    `Completion:   ${done} of ${tasks.length} tasks  (${pct}%)`,
    `Exported:     ${new Date().toLocaleString("en-US")}`,HR,""];
  groups.forEach(time=>{
    lines.push(`  ${time}`);
    tasks.filter(t=>t.time===time).forEach(t=>lines.push(`    [${checkedSet.has(t.id)?"✓":" "}]  ${t.label}`));
    lines.push("");
  });
  if(notes?.trim()) lines.push(HR,"NOTES","",notes.trim(),"");
  lines.push(HR,"Generated by Mason's Operations Tracker");
  return lines.join("\n");
}


function buildSheetRows(weekIdx,day,tasks,checkedSet,notes){

  const labels={idle:"All saved",loading:"Loading…",saving:"Saving…",error:"Error",dirty:"Unsaved changes"};

  return <div style={{display:"flex",alignItems:"center",gap:5}}>
    <span style={{width:7,height:7,borderRadius:"50%",background:colors[st]||colors.idle,
      boxShadow:(st==="loading"||st==="saving")?`0 0 0 3px ${colors[st]}33`:"none",
      animation:(st==="loading"||st==="saving"||st==="dirty")?"pulse 1s infinite":"none"}}/>
    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"rgba(255,255,255,0.3)"}}>{labels[st]||"Unknown"}</span>
  </div>;
}

function ProgressRing({pct,size=72,stroke=5,color="#60A5FA",label}){

  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>

function RescheduleModal({task,currentWeekIdx,currentDay,onReschedule,onClose}){
  const [sel,setSel]=useState(null);
  const meta=CATEGORY_META[task.category]||CATEGORY_META.team;
  const groups=[];
  const maxWi=Math.min(ALL_WEEKS.length-1,currentWeekIdx+2);
  for(let wi=currentWeekIdx;wi<=maxWi;wi++){
    const days=DAYS.filter(d=>wi===currentWeekIdx?DAYS.indexOf(d)>DAYS.indexOf(currentDay):true);
    if(days.length>0) groups.push({wi,label:ALL_WEEKS[wi].label,days});
  }
  const willRecur=sel&&taskAppearsOnDay(task,sel.day);
  return <Modal title="Reschedule task" subtitle="PUSH TO FUTURE" onClose={onClose} maxWidth={460}>
    <div style={{padding:"10px 14px",borderRadius:9,background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",marginBottom:14}}>
      <div style={{fontFamily:"Outfit",fontWeight:600,fontSize:14,color:"#EFEFEF"}}>{task.label}</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:"rgba(255,255,255,0.3)",marginTop:3}}>{task.time} · {meta.label}</div>
    </div>
    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"rgba(255,255,255,0.35)",letterSpacing:"0.1em",marginBottom:10}}>MOVE TO DAY</div>
    {groups.length===0
      ?<div style={{padding:"16px 0",textAlign:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"rgba(255,255,255,0.25)"}}>No future days in range. Add more weeks first.</div>
      :<div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:12}}>
        {groups.map(({wi,label,days})=>(
          <div key={wi}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.28)",letterSpacing:"0.1em",marginBottom:5}}>{label}</div>
            <div style={{display:"flex",gap:5}}>
              {days.map(d=>{const isSelected=sel?.wi===wi&&sel?.day===d;return <button key={d} onClick={()=>setSel({wi,day:d})} style={{flex:1,padding:"8px 4px",borderRadius:8,border:`1px solid ${isSelected?"#A78BFA":"rgba(255,255,255,0.1)"}`,background:isSelected?"rgba(167,139,250,0.15)":"rgba(255,255,255,0.03)",color:isSelected?"#C4B5FD":"rgba(255,255,255,0.5)",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer"}}>{d}</button>;})}
            </div>
          </div>
        ))}
      </div>
    }
    {willRecur&&<div style={{padding:"8px 12px",borderRadius:9,background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.2)",marginBottom:12}}>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#93C5FD"}}>This task already recurs on {sel.day} — a copy will still appear there.</span>
    </div>}
    <div style={{display:"flex",gap:9,marginTop:6}}>
      <button onClick={onClose} style={{flex:1,padding:"9px 0",borderRadius:9,cursor:"pointer",border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"rgba(255,255,255,0.35)",fontFamily:"Outfit",fontWeight:600,fontSize:14}}>Cancel</button>
      <button onClick={()=>sel&&onReschedule(task,sel.wi,sel.day)} disabled={!sel} style={{flex:1.5,padding:"9px 0",borderRadius:9,cursor:sel?"pointer":"not-allowed",border:"none",background:sel?"linear-gradient(135deg,#5B21B6,#A78BFA)":"rgba(255,255,255,0.05)",color:sel?"#fff":"rgba(255,255,255,0.2)",fontFamily:"Outfit",fontWeight:700,fontSize:14}}>Push to {sel?sel.day+" →":"Future →"}</button>
    </div>
  </Modal>;

function SlotsModal({slots,onSave,onClose}){

  const addSlot=()=>{ const v=newSlot.trim(); if(!v||list.includes(v)) return; setList(p=>[...p,v]); setNewSlot(""); };
  const remove=i=>setList(p=>p.filter((_,j)=>j!==i));
  const startEdit=i=>{setEditIdx(i);setEditVal(list[i]);};
  const commitEdit=()=>{ const v=editVal.trim(); if(!v) return; setList(p=>p.map((s,i)=>i===editIdx?v:s)); setEditIdx(null); };
  return <Modal title="Manage time slots" subtitle="TIME SLOTS" onClose={onClose} maxWidth={420}>
    <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:14,maxHeight:300,overflowY:"auto"}}>

          {editIdx===i?<>
            <input style={{...IS,flex:1,padding:"5px 9px"}} value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&commitEdit()} autoFocus/>
            <button onClick={commitEdit} style={{padding:"4px 10px",borderRadius:7,background:"rgba(96,165,250,0.15)",border:"1px solid rgba(96,165,250,0.3)",color:"#93C5FD",cursor:"pointer",fontFamily:"Outfit",fontSize:12,fontWeight:600}}>Save</button>

            <span style={{flex:1,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"rgba(255,255,255,0.6)"}}>{s}</span>
            <button onClick={()=>startEdit(i)} style={{padding:"3px 9px",borderRadius:7,background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontFamily:"Outfit",fontSize:11}}>Edit</button>

          </>}
        </div>
      ))}

    <div style={{display:"flex",gap:8}}>
      <input style={{...IS,flex:1}} value={newSlot} onChange={e=>setNewSlot(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSlot()} placeholder="e.g. 3:00 – 3:30 PM"/>
      <button onClick={addSlot} style={{padding:"9px 14px",borderRadius:9,background:"rgba(96,165,250,0.12)",border:"1px solid rgba(96,165,250,0.25)",color:"#93C5FD",cursor:"pointer",fontFamily:"Outfit",fontWeight:600,fontSize:13}}>Add</button>
    </div>
    <div style={{display:"flex",gap:9,marginTop:14}}>
      <button onClick={onClose} style={{flex:1,padding:"9px 0",borderRadius:9,cursor:"pointer",border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"rgba(255,255,255,0.35)",fontFamily:"Outfit",fontWeight:600,fontSize:14}}>Cancel</button>
      <button onClick={()=>onSave(list)} style={{flex:1.5,padding:"9px 0",borderRadius:9,cursor:"pointer",border:"none",background:"linear-gradient(135deg,#1D4ED8,#3B82F6)",color:"#fff",fontFamily:"Outfit",fontWeight:700,fontSize:14}}>Save Slots</button>

}


function ExportModal({weekIdx,day,tasks,checkedSet,notes,onClose}){
  const [fmt,setFmt]=useState("xlsx");
  const [copied,setCopied]=useState(false);
  const [downloaded,setDownloaded]=useState(false);
  const week=ALL_WEEKS[weekIdx];
  const dayDate=new Date(week.mon); dayDate.setDate(dayDate.getDate()+DAYS.indexOf(day));
  const fileBase=`mason_${day.toLowerCase()}_${dayDate.toISOString().slice(0,10)}`;
  const done=tasks.filter(t=>checkedSet.has(t.id)).length;
  const pct=tasks.length?Math.round(done/tasks.length*100):0;
  const txtContent=buildTxt(weekIdx,day,tasks,checkedSet,notes);
  const handleDownload=()=>{
    if(fmt==="xlsx"){
      const wb=XLSX.utils.book_new();
      const ws=XLSX.utils.aoa_to_sheet(buildSheetRows(weekIdx,day,tasks,checkedSet,notes));
      XLSX.utils.book_append_sheet(wb,ws,DAY_FULL[day]);
      XLSX.writeFile(wb,`${fileBase}.xlsx`);
    } else {
      const blob=new Blob([txtContent],{type:"text/plain"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url; a.download=`${fileBase}.txt`; a.click();
      URL.revokeObjectURL(url);
    }
    setDownloaded(true);
    setTimeout(()=>setDownloaded(false),2500);
  };
  const handleCopy=()=>{navigator.clipboard.writeText(txtContent).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});};
  return <Modal title={`Export — ${DAY_FULL[day]}`} subtitle="EXPORT DAY SUMMARY" onClose={onClose} maxWidth={480}>
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"rgba(255,255,255,0.3)"}}>COMPLETION</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:pct===100?"#34D399":pct>=50?"#60A5FA":"#F472B6"}}>{pct}%  ·  {done}/{tasks.length}</span>
      </div>
      <ProgressBar pct={pct}/>
    </div>
    <FormRow label="FORMAT">
      <div style={{display:"flex",gap:8}}>
        {[["xlsx","Excel (.xlsx)"],["txt","Plain text (.txt)"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFmt(v)} style={{flex:1,padding:"9px 10px",borderRadius:9,border:`1px solid ${fmt===v?"#60A5FA":"rgba(255,255,255,0.08)"}`,background:fmt===v?"rgba(96,165,250,0.1)":"rgba(255,255,255,0.02)",color:fmt===v?"#93C5FD":"rgba(255,255,255,0.38)",fontFamily:"Outfit",fontWeight:600,fontSize:13,cursor:"pointer"}}>{l}</button>
        ))}
      </div>
      {fmt==="xlsx"&&<div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:6}}>Columns: Start Time · Task · Completed (TRUE/FALSE)</div>}
    </FormRow>
    <div style={{background:"rgba(0,0,0,0.4)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:9,padding:"10px 13px",maxHeight:100,overflowY:"auto",marginBottom:14}}>
      <pre style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"rgba(255,255,255,0.35)",lineHeight:1.65,whiteSpace:"pre-wrap",wordBreak:"break-word",margin:0}}>{fmt==="xlsx"?"Excel workbook · sheet: "+DAY_FULL[day]+"\n\nStart Time  ·  Task  ·  Completed\n─────────────────────────────────":txtContent.slice(0,380)+"…"}</pre>
    </div>
    <div style={{display:"flex",gap:9}}>
      {fmt==="txt"&&<button onClick={handleCopy} style={{flex:1,padding:"11px 0",borderRadius:10,border:`1px solid ${copied?"rgba(52,211,153,0.35)":"rgba(255,255,255,0.1)"}`,background:copied?"rgba(52,211,153,0.1)":"rgba(255,255,255,0.03)",color:copied?"#34D399":"rgba(255,255,255,0.55)",fontFamily:"Outfit",fontWeight:600,fontSize:13,cursor:"pointer"}}>{copied?"✓ Copied!":"Copy"}</button>}
      <button onClick={handleDownload} style={{flex:fmt==="txt"?1:"unset",width:fmt==="xlsx"?"100%":undefined,padding:"11px 0",borderRadius:10,border:`1px solid ${downloaded?"rgba(52,211,153,0.35)":"rgba(96,165,250,0.25)"}`,background:downloaded?"rgba(52,211,153,0.1)":"rgba(96,165,250,0.08)",color:downloaded?"#34D399":"#93C5FD",fontFamily:"Outfit",fontWeight:600,fontSize:13,cursor:"pointer"}}>{downloaded?"✓ Saved!":"⬇ Download"}</button>
    </div>
  </Modal>;
}

    <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:360,overflowY:"auto",marginBottom:14}}>
      {weeks.map((w,i)=>{
        const isCur=i===getCurrentWeekIdx(),isSel=i===weekIdx,canRemove=(i===0||i===weeks.length-1)&&weeks.length>1;
        return <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:10,background:isSel?"rgba(96,165,250,0.08)":"rgba(255,255,255,0.02)",border:`1px solid ${isSel?"rgba(96,165,250,0.25)":isCur?"rgba(52,211,153,0.2)":"rgba(255,255,255,0.06)"}`}}>
          <div style={{flex:1,display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:isSel?"#93C5FD":isCur?"#34D399":"rgba(255,255,255,0.45)"}}>{w.label}</span>
            {isCur&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8.5,color:"#34D399",background:"#34D39914",padding:"1px 6px",borderRadius:99}}>CURRENT</span>}
            {isSel&&!isCur&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8.5,color:"#93C5FD",background:"rgba(96,165,250,0.1)",padding:"1px 6px",borderRadius:99}}>VIEWING</span>}
          </div>
          {canRemove&&(confirm?.wi===i
            ?<div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"rgba(255,255,255,0.35)"}}>Remove?</span>
                <button onClick={()=>{onRemoveWeek(i);setConfirm(null);}} style={{padding:"3px 10px",borderRadius:7,background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.3)",color:"#FCA5A5",cursor:"pointer",fontFamily:"Outfit",fontSize:11,fontWeight:700}}>Yes</button>
                <button onClick={()=>setConfirm(null)} style={{padding:"3px 10px",borderRadius:7,background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontFamily:"Outfit",fontSize:11}}>No</button>
              </div>
            :<button onClick={()=>setConfirm({wi:i})} style={{padding:"3px 10px",borderRadius:7,background:"transparent",border:"1px solid rgba(239,68,68,0.2)",color:"#FCA5A5",cursor:"pointer",fontFamily:"Outfit",fontSize:11}}>Remove</button>
          )}
        </div>;
      })}
    </div>
    <button onClick={onClose} style={{width:"100%",padding:"9px 0",borderRadius:9,cursor:"pointer",border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"rgba(255,255,255,0.35)",fontFamily:"Outfit",fontWeight:600,fontSize:14}}>Done</button>
  </Modal>;
}

    e.preventDefault();
    if(code===ACCESS_CODE){localStorage.setItem(AUTH_KEY,"1");onUnlock();}
    else{setError(true);setCode("");}

  return <div style={{minHeight:"100vh",background:"#0A0C12",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Outfit"}}>

    <h1 style={{fontSize:26,fontWeight:900,color:"#fff",marginBottom:6}}>Mason's <span style={{background:"linear-gradient(90deg,#60A5FA,#A78BFA)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Operations Tracker</span></h1>

      {error&&<p style={{color:"#F87171",fontSize:12,margin:0}}>Incorrect access code</p>}

    </form>

// ── MAIN APP ──
function App(){
  const [weekIdx,setWeekIdx]=useState(0);
  const [weeksReady,setWeeksReady]=useState(false);
  const [weekRange,setWeekRange]=useState(null);
  const [activeDay,setActiveDay]=useState(()=>{const d=getTodayDayName();return DAYS.includes(d)?d:"Mon";});
  const [allTasks,setAllTasks]=useState(DEFAULT_TASKS);
  const [timeSlots,setTimeSlots]=useState(DEFAULT_TIME_SLOTS);
  const [overrides,setOverrides]=useState({});
  const [checked,setChecked]=useState({Mon:new Set(),Tue:new Set(),Wed:new Set(),Thu:new Set(),Fri:new Set()});
  const [notes,setNotes]=useState({Mon:"",Tue:"",Wed:"",Thu:"",Fri:""});
  const [loading,setLoading]=useState(true);
  const [dirty,setDirty]=useState(false);
  const [syncStatus,setSyncStatus]=useState("idle");
  const [modal,setModal]=useState(null);
  const [pendingScopes,setPendingScopes]=useState([]);
  const [pendingOverrideOps,setPendingOverrideOps]=useState([]);
  const [view,setView]=useState("day");
  const [sortBy,setSortBy]=useState("time");
  const [addMenuOpen,setAddMenuOpen]=useState(false);
  const [settingsMenuOpen,setSettingsMenuOpen]=useState(false);
  const todayDay=getTodayDayName();
  const isCurrentWeek=weekIdx===getCurrentWeekIdx();
  const omKey=(wi,d)=>`${wi}_${d}`;

  // ── WEEK RANGE INIT (once) ──
  useEffect(()=>{
    async function loadRange(){
      try{
        const raw=await store.get(WEEK_RANGE_KEY);
        let range=null;
        if(raw) try{const r=JSON.parse(raw);range={start:new Date(r.start),end:new Date(r.end)};}catch{}
        if(!range){
          range=getDefaultWeekRange();
          await store.set(WEEK_RANGE_KEY,JSON.stringify({start:range.start.toISOString(),end:range.end.toISOString()}));
        }
        ALL_WEEKS.length=0;
        generateWeeks(range.start,range.end).forEach(w=>ALL_WEEKS.push(w));
        setWeekRange(range);
        const ci=getCurrentWeekIdx();
        setWeekIdx(ci>=0?ci:0);
      }catch(e){
        console.error(e);
        const range=getDefaultWeekRange();
        ALL_WEEKS.length=0;
        generateWeeks(range.start,range.end).forEach(w=>ALL_WEEKS.push(w));
        setWeekRange(range);
        setWeekIdx(0);
      }
      setWeeksReady(true);
    }
    loadRange();
  },[]);

  // ── PER-WEEK DATA LOAD (on weekIdx change) ──
  useEffect(()=>{
    if(!weeksReady) return;
    async function init(){
      setLoading(true);
      try{
        const rawSlots=await store.get(SLOTS_KEY);
        if(rawSlots) try{setTimeSlots(JSON.parse(rawSlots));}catch{}

        // Load tasks for this week; if none exist, copy from previous week or use defaults
        const rawTasks=await store.get(tasksKey(weekIdx));
        if(rawTasks){ try{setAllTasks(JSON.parse(rawTasks));}catch{} }
        else{
          let base=DEFAULT_TASKS;
          if(weekIdx>0){ const prev=await store.get(tasksKey(weekIdx-1)); if(prev) try{base=JSON.parse(prev);}catch{} }
          setAllTasks(base);
          await store.set(tasksKey(weekIdx),JSON.stringify(base));
        }

        // Load checked / notes / overrides for this week
        const nc={},nn={},nov={};
        for(const d of DAYS){
          const [rawC,rawN,rawOv]=await Promise.all([
            store.get(checkedKey(weekIdx,d)),
            store.get(notesKey(weekIdx,d)),
            store.get(overrideKey(weekIdx,d))
          ]);
          nc[d]=new Set(rawC?JSON.parse(rawC):[]);
          nn[d]=rawN||"";
          if(rawOv) try{nov[omKey(weekIdx,d)]=JSON.parse(rawOv);}catch{}
        }
        setChecked(nc); setNotes(nn); setOverrides(nov);
        setDirty(false);
      }catch(e){ console.error(e); setSyncStatus("error"); }
      finally{ setLoading(false); }
    }
    init();
  },[weekIdx,weeksReady]);

  const getOv=(wi,d)=>overrides[omKey(wi,d)]||{removed:[],added:[],slotOverrides:{}};
  const updateOv=(wi,d,updater)=>{
    const prev=getOv(wi,d),next=updater(prev),key=omKey(wi,d);
    setOverrides(p=>({...p,[key]:next}));
    setDirty(true);
  };

  const toggle=useCallback((day,id)=>{
    const s=new Set(checked[day]); s.has(id)?s.delete(id):s.add(id);
    const next={...checked,[day]:s};
    setChecked(next);
    setDirty(true);
  },[checked]);

  const handleNotes=(day,text)=>{
    setNotes(p=>({...p,[day]:text}));
    setDirty(true);
  };

  // Task save/delete with scope support — updates local state only, marks dirty
  const applyTasksLocally=(startWi,endWi,updater)=>{
    if(startWi<=weekIdx&&weekIdx<=endWi){
      const next=updater(allTasks);
      setAllTasks(next);
    }
    setDirty(true);
  };

  const handleSaveTask=(t,scope)=>{
    const updater=tasks=>tasks.find(x=>x.id===t.id)?tasks.map(x=>x.id===t.id?t:x):[...tasks,t];
    const startWi=scope==="all"?0:weekIdx;
    const endWi=scope==="this"?weekIdx:ALL_WEEKS.length-1;
    applyTasksLocally(startWi,endWi,updater);
    if(scope!=="this"){
      setPendingScopes(p=>[...p.filter(x=>x.taskId!==t.id),{type:"upsert",task:t,startWi,endWi}]);
    }
    if(!timeSlots.includes(t.time)){
      const ns=[...timeSlots,t.time]; setTimeSlots(ns);
      setDirty(true);
    }
    setModal(null);
  };

  const handleDeleteTask=(id,scope)=>{
    const updater=tasks=>tasks.filter(x=>x.id!==id);
    const startWi=scope==="all"?0:weekIdx;
    const endWi=scope==="this"?weekIdx:ALL_WEEKS.length-1;
    applyTasksLocally(startWi,endWi,updater);
    if(scope!=="this"){
      setPendingScopes(p=>[...p,{type:"delete",taskId:id,startWi,endWi}]);
    }
    setModal(null);
  };

  const handleSaveDayTask=t=>{
    updateOv(weekIdx,activeDay,prev=>({...prev,added:[...(prev.added||[]).filter(x=>x.id!==t.id),t]}));
    if(!timeSlots.includes(t.time)){
      const ns=[...timeSlots,t.time]; setTimeSlots(ns);
      setDirty(true);
    }
    setModal(null);
  };
  const handleEditDayTask=t=>{ updateOv(weekIdx,activeDay,prev=>({...prev,added:(prev.added||[]).map(x=>x.id===t.id?t:x)})); setModal(null); };
  const handleToggleRemoveTask=taskId=>{ updateOv(weekIdx,activeDay,prev=>{const r=prev.removed||[];return{...prev,removed:r.includes(taskId)?r.filter(x=>x!==taskId):[...r,taskId]};}); setModal(null); };
  const handleDaySlotChange=(taskId,newSlot)=>{
    updateOv(weekIdx,activeDay,prev=>({...prev,slotOverrides:{...(prev.slotOverrides||{}),[taskId]:newSlot}}));
    if(!timeSlots.includes(newSlot)){
      const ns=[...timeSlots,newSlot]; setTimeSlots(ns);
      setDirty(true);
    }
    setModal(null);
  };
  const handleSaveSlots=list=>{ setTimeSlots(list); setDirty(true); setModal(null); };

  const handleRescheduleTask=(task,targetWi,targetDay)=>{
    // Only add to target day if task doesn't naturally appear there (avoid duplicates)
    if(!taskAppearsOnDay(task,targetDay)){
      const rescheduled={...task,_dayOnly:true};
      if(targetWi===weekIdx){
        updateOv(weekIdx,targetDay,prev=>({...prev,added:[...(prev.added||[]).filter(x=>x.id!==rescheduled.id),rescheduled]}));
      } else {
        setPendingOverrideOps(p=>[...p,{type:"addTask",task:rescheduled,wi:targetWi,day:targetDay}]);
        setDirty(true);
      }
    }
    setModal(null);
  };

  const handleRescheduleDayTask=(task,targetWi,targetDay)=>{
    // Add a copy to target day (original remains on current day)
    if(targetWi===weekIdx){
      updateOv(weekIdx,targetDay,prev=>({...prev,added:[...(prev.added||[]).filter(x=>x.id!==task.id),task]}));
    } else {
      setPendingOverrideOps(p=>[...p,{type:"addTask",task,wi:targetWi,day:targetDay}]);
      setDirty(true);
    }
    setModal(null);
  };

  const handleRefresh=async()=>{
    setSyncStatus("loading");
    try{
      const rawSlots=await store.get(SLOTS_KEY);
      if(rawSlots) try{setTimeSlots(JSON.parse(rawSlots));}catch{}

      const rawTasks=await store.get(tasksKey(weekIdx));
      if(rawTasks) try{setAllTasks(JSON.parse(rawTasks));}catch{}

      const nc={},nn={},nov={};
      for(const d of DAYS){
        const [rawC,rawN,rawOv]=await Promise.all([
          store.get(checkedKey(weekIdx,d)),
          store.get(notesKey(weekIdx,d)),
          store.get(overrideKey(weekIdx,d))
        ]);
        nc[d]=new Set(rawC?JSON.parse(rawC):[]);
        nn[d]=rawN||"";
        if(rawOv) try{nov[omKey(weekIdx,d)]=JSON.parse(rawOv);}catch{}
      }
      setChecked(nc); setNotes(nn); setOverrides(nov);
      setDirty(false);
      setSyncStatus("idle");
    }catch(e){
      console.error(e);
      setSyncStatus("error");
    }
  };

  const handleSave=async()=>{
    setSyncStatus("saving");
    try{
      await store.set(SLOTS_KEY,JSON.stringify(timeSlots));
      await store.set(tasksKey(weekIdx),JSON.stringify(allTasks));
      for(const d of DAYS){
        await store.set(checkedKey(weekIdx,d),JSON.stringify([...checked[d]]));
        await store.set(notesKey(weekIdx,d),notes[d]||"");
        const ov=overrides[omKey(weekIdx,d)]||{removed:[],added:[],slotOverrides:{}};
        await store.set(overrideKey(weekIdx,d),JSON.stringify(ov));
      }
      for(const op of pendingScopes){
        for(let wi=op.startWi;wi<=op.endWi;wi++){
          if(wi===weekIdx) continue;
          const raw=await store.get(tasksKey(wi));
          let wTasks=raw?JSON.parse(raw):DEFAULT_TASKS;
          if(op.type==="upsert"){
            wTasks=wTasks.find(x=>x.id===op.task.id)?wTasks.map(x=>x.id===op.task.id?op.task:x):[...wTasks,op.task];
          } else {
            wTasks=wTasks.filter(x=>x.id!==op.taskId);
          }
          await store.set(tasksKey(wi),JSON.stringify(wTasks));
        }
      }
      setPendingScopes([]);
      for(const op of pendingOverrideOps){
        if(op.type==="addTask"){
          const raw=await store.get(overrideKey(op.wi,op.day));
          let mov=raw?JSON.parse(raw):{removed:[],added:[],slotOverrides:{}};
          mov.added=[...(mov.added||[]).filter(x=>x.id!==op.task.id),op.task];
          await store.set(overrideKey(op.wi,op.day),JSON.stringify(mov));
        }
      }
      setPendingOverrideOps([]);
      setDirty(false);
      setSyncStatus("idle");
    }catch(e){
      console.error(e);
      setSyncStatus("error");
    }
  };

  const handleAddWeek=async(position)=>{
    setSyncStatus("loading");
    try{
      let newRange;
      if(position==="end"){
        const lastSun=ALL_WEEKS[ALL_WEEKS.length-1].startSunday;
        const nextSun=addWeeks(lastSun,1);
        newRange={start:weekRange.start,end:nextSun};
      } else {
        const firstSun=ALL_WEEKS[0].startSunday;
        const prevSun=addWeeks(firstSun,-1);
        newRange={start:prevSun,end:weekRange.end};
      }
      await store.set(WEEK_RANGE_KEY,JSON.stringify({start:newRange.start.toISOString(),end:newRange.end.toISOString()}));
      ALL_WEEKS.length=0;
      generateWeeks(newRange.start,newRange.end).forEach(w=>ALL_WEEKS.push(w));
      setWeekRange({...newRange});
      // Preload the new week's tasks from the adjacent week
      if(position==="end"){
        const newWi=ALL_WEEKS.length-1;
        const prev=await store.get(tasksKey(newWi-1));
        const base=prev?JSON.parse(prev):DEFAULT_TASKS;
        await store.set(tasksKey(newWi),JSON.stringify(base));
      } else {
        const prev=await store.get(tasksKey(1));
        const base=prev?JSON.parse(prev):DEFAULT_TASKS;
        await store.set(tasksKey(0),JSON.stringify(base));
        setWeekIdx(wi=>wi+1);
      }
      setSyncStatus("idle");
    }catch(e){
      console.error(e);
      setSyncStatus("error");
    }
    setModal(null);
  };

  const handleRemoveWeek=async(wi)=>{
    if(ALL_WEEKS.length<=1) return;
    setSyncStatus("loading");
    try{
      let newRange;
      if(wi===ALL_WEEKS.length-1){
        const prevSun=ALL_WEEKS[wi-1].startSunday;
        newRange={start:weekRange.start,end:prevSun};
      } else {
        const nextSun=ALL_WEEKS[1].startSunday;
        newRange={start:nextSun,end:weekRange.end};
      }
      await store.set(WEEK_RANGE_KEY,JSON.stringify({start:newRange.start.toISOString(),end:newRange.end.toISOString()}));
      ALL_WEEKS.length=0;
      generateWeeks(newRange.start,newRange.end).forEach(w=>ALL_WEEKS.push(w));
      setWeekRange({...newRange});
      setWeekIdx(cur=>Math.min(cur,ALL_WEEKS.length-1));
      setSyncStatus("idle");
    }catch(e){
      console.error(e);
      setSyncStatus("error");
    }
    setModal(null);
  };

  const getDayTasks=d=>buildDayTasks(allTasks,d,getOv(weekIdx,d));
  const activeTasks=getDayTasks(activeDay);
  const ov=getOv(weekIdx,activeDay);
  const dayPct=d=>{const t=getDayTasks(d);return t.length?Math.round((checked[d]?.size||0)/t.length*100):0;};
  const weekPct=Math.round(DAYS.reduce((s,d)=>s+dayPct(d),0)/DAYS.length);
  const totalWeekTasks=DAYS.reduce((s,d)=>s+getDayTasks(d).length,0);
  const completedWeekTasks=DAYS.reduce((s,d)=>s+(checked[d]?.size||0),0);
  const daysCompleted=DAYS.filter(d=>dayPct(d)===100).length;
  const taskGroups=(()=>{
    if(sortBy==="category"){
      const g={};
      activeTasks.forEach(t=>{const k=CATEGORY_META[t.category]?.label||t.category;(g[k]||(g[k]=[])).push(t);});
      return Object.entries(g).sort(([a],[b])=>a.localeCompare(b));
    }
    if(sortBy==="label"){
      return [["A – Z",[...activeTasks].sort((a,b)=>a.label.localeCompare(b.label))]];
    }
    if(sortBy==="status"){
      const incomplete=activeTasks.filter(t=>!checked[activeDay]?.has(t.id));
      const complete=activeTasks.filter(t=>checked[activeDay]?.has(t.id));
      return [...(incomplete.length?[["Incomplete",incomplete]]:[]),(complete.length?["Complete ✓",complete]:null)].filter(Boolean);
    }
    // default: time
    const g={};activeTasks.forEach(t=>{(g[t.time]||(g[t.time]=[])).push(t);});
    return Object.entries(g).sort(([a],[b])=>timeSlots.indexOf(a)-timeSlots.indexOf(b));
  })();
  const activePct=dayPct(activeDay);
  const isDayOnlyAdded=t=>(ov.added||[]).some(x=>x.id===t.id);

  return <div style={{minHeight:"100vh",background:"#0A0C12",backgroundImage:"radial-gradient(ellipse 80% 50% at 50% -10%, rgba(30,58,138,0.35) 0%, transparent 60%)",color:"#F0F0F0",fontFamily:"Outfit",paddingBottom:80}}>

    <div style={{maxWidth:900,margin:"0 auto",padding:"28px 20px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:16,flexWrap:"wrap"}}>
        <div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"#60A5FA",letterSpacing:"0.14em",marginBottom:7,opacity:0.8}}>CORNERSTONE HEALING CENTER · PHX OUTPATIENT</div>
          <h1 style={{fontSize:26,fontWeight:900,letterSpacing:"-0.03em",lineHeight:1.15,color:"#fff"}}>
            Mason's <span style={{background:"linear-gradient(90deg,#60A5FA,#A78BFA)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Operations Tracker</span>
          </h1>
          <div style={{marginTop:6,display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:"rgba(255,255,255,0.3)"}}>IAR Lead · Week of {ALL_WEEKS[weekIdx]?.label}</span>
            <SyncDot status={syncStatus} dirty={dirty}/>
          </div>
        </div>
        <ProgressRing pct={weekPct} size={68} stroke={5} color="#60A5FA" label="WEEK AVG"/>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:14,marginTop:14,flexWrap:"wrap"}}>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:"rgba(255,255,255,0.45)"}}><span style={{color:"#60A5FA",fontWeight:700}}>{completedWeekTasks}</span><span style={{color:"rgba(255,255,255,0.25)"}}> / {totalWeekTasks} done</span></span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:"rgba(255,255,255,0.2)"}}>·</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:weekPct===100?"#34D399":"#A78BFA",fontWeight:700}}>{weekPct}%</span>
        {isCurrentWeek&&DAYS.includes(todayDay)&&<><span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:"rgba(255,255,255,0.2)"}}>·</span><span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:"rgba(255,255,255,0.45)"}}>Today <span style={{color:"#34D399",fontWeight:700}}>{dayPct(todayDay)}%</span></span></>}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:10}}>
        <button className="bh" onClick={()=>setWeekIdx(i=>Math.max(0,i-1))} disabled={weekIdx===0} style={{width:28,height:28,borderRadius:8,border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:weekIdx===0?"rgba(255,255,255,0.12)":"rgba(255,255,255,0.4)",cursor:weekIdx===0?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,lineHeight:1}}>‹</button>
        <div style={{flex:1,textAlign:"center"}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:"#93C5FD",display:"inline-flex",alignItems:"center",gap:6}}>
            {isCurrentWeek&&<span style={{width:6,height:6,borderRadius:"50%",background:"#34D399",animation:"pulse 2s infinite",display:"inline-block",flexShrink:0}}/>}
            Week of {ALL_WEEKS[weekIdx]?.label}
          </span>
        </div>
        <button className="bh" onClick={()=>setWeekIdx(i=>Math.min(ALL_WEEKS.length-1,i+1))} disabled={weekIdx===ALL_WEEKS.length-1} style={{width:28,height:28,borderRadius:8,border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:weekIdx===ALL_WEEKS.length-1?"rgba(255,255,255,0.12)":"rgba(255,255,255,0.4)",cursor:weekIdx===ALL_WEEKS.length-1?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,lineHeight:1}}>›</button>
      </div>
    </div>

    <div style={{maxWidth:900,margin:"14px auto 0",padding:"0 20px"}}>
      <div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:4,alignItems:"stretch"}}>
        <div style={{display:"flex",gap:2,padding:2,background:"rgba(255,255,255,0.03)",borderRadius:10,flexShrink:0,alignSelf:"center"}}>
          {[["day","Day"],["week","Week"]].map(([v,l])=>(
            <button key={v} className="bh" onClick={()=>setView(v)} style={{padding:"7px 11px",borderRadius:8,border:"none",cursor:"pointer",background:view===v?"rgba(96,165,250,0.18)":"transparent",color:view===v?"#93C5FD":"rgba(255,255,255,0.35)",fontFamily:"Outfit",fontWeight:700,fontSize:12,outline:view===v?"1px solid rgba(96,165,250,0.25)":"none"}}>{l}</button>
          ))}
        </div>
        <div style={{width:1,background:"rgba(255,255,255,0.06)",margin:"6px 2px"}}/>
        {DAYS.map(d=>{
          const pct=dayPct(d),isToday=isCurrentWeek&&d===todayDay,isActive=d===activeDay;
          const ov2=getOv(weekIdx,d);
          const hasOv=((ov2.removed||[]).length>0||(ov2.added||[]).length>0||Object.keys(ov2.slotOverrides||{}).length>0);
          return <button key={d} className="bh" onClick={()=>{setActiveDay(d);setView("day");}} style={{flex:1,padding:"8px 4px 7px",borderRadius:10,border:"none",cursor:"pointer",background:isActive?"rgba(96,165,250,0.12)":"transparent",outline:isActive?"1px solid rgba(96,165,250,0.25)":"none",opacity:isActive?1:0.5,position:"relative"}}>
            {hasOv&&<span style={{position:"absolute",top:5,right:7,width:5,height:5,borderRadius:"50%",background:"#FB923C"}}/>}
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{display:"flex",alignItems:"center",gap:3}}>
                {isToday&&<span style={{width:5,height:5,borderRadius:"50%",background:"#34D399",animation:"pulse 2s infinite"}}/>}
                <span style={{fontFamily:"Outfit",fontWeight:700,fontSize:12,color:isActive?"#93C5FD":"#CCC"}}>{d}</span>
              </div>
              <ProgressBar pct={pct} height={2.5}/>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:pct===100?"#34D399":"rgba(255,255,255,0.28)"}}>{pct}%</span>
            </div>
          </button>;
        })}
      </div>

      <div style={{display:"flex",gap:6,marginTop:8,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{position:"relative"}}>
          {addMenuOpen&&<div style={{position:"fixed",inset:0,zIndex:5}} onClick={()=>setAddMenuOpen(false)}/>}
          <button className="bh" onClick={()=>setAddMenuOpen(p=>!p)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.7)",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>+ Add <span style={{fontSize:9,opacity:0.6,marginLeft:2}}>▾</span></button>
          {addMenuOpen&&<div style={{position:"absolute",top:"calc(100% + 6px)",left:0,zIndex:10,background:"#111420",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,boxShadow:"0 16px 40px rgba(0,0,0,0.6)",overflow:"hidden",minWidth:150}}>
            <button className="bh" onClick={()=>{setAddMenuOpen(false);setModal("newDayTask");}} style={{display:"block",width:"100%",padding:"9px 14px",border:"none",background:"transparent",color:"#FB923C",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer",textAlign:"left"}}>+ Today Only</button>
            <div style={{height:1,background:"rgba(255,255,255,0.05)"}}/>
            <button className="bh" onClick={()=>{setAddMenuOpen(false);setModal("newTask");}} style={{display:"block",width:"100%",padding:"9px 14px",border:"none",background:"transparent",color:"#34D399",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer",textAlign:"left"}}>+ Repeating</button>
          </div>}
        </div>

        <div style={{display:"flex",alignItems:"center",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,overflow:"hidden"}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"rgba(255,255,255,0.3)",letterSpacing:"0.06em",padding:"0 6px 0 10px",pointerEvents:"none",userSelect:"none"}}>SORT</span>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{padding:"6px 4px 6px 0",border:"none",background:"transparent",color:"#93C5FD",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer",outline:"none",appearance:"none",WebkitAppearance:"none"}}>
            {[["time","Time"],["category","Category"],["label","Label"],["status","Status"]].map(([v,l])=>(
              <option key={v} value={v}>{l}</option>
            ))}
          </select>
          <span style={{color:"rgba(255,255,255,0.3)",fontSize:9,paddingRight:8,pointerEvents:"none"}}>▾</span>
        </div>

        <div style={{flex:1}}/>

        <button className="bh" onClick={()=>setModal("export")} style={{padding:"6px 11px",borderRadius:8,border:"1px solid rgba(96,165,250,0.2)",background:"rgba(96,165,250,0.06)",color:"#93C5FD",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer"}}>↓ Export</button>

        <button className="bh" onClick={handleRefresh} disabled={syncStatus!=="idle"} title="Refresh" style={{width:32,height:32,borderRadius:8,border:`1px solid ${syncStatus!=="idle"?"rgba(255,255,255,0.05)":"rgba(96,165,250,0.2)"}`,background:syncStatus!=="idle"?"transparent":"rgba(96,165,250,0.06)",color:syncStatus!=="idle"?"rgba(255,255,255,0.2)":"#93C5FD",cursor:syncStatus!=="idle"?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>
          {syncStatus==="loading"?<span style={{width:10,height:10,border:"2px solid rgba(255,255,255,0.2)",borderTopColor:"#FCD34D",borderRadius:"50%",display:"inline-block",animation:"spin 0.6s linear infinite"}}/>:"🔄"}
        </button>

        <button className="bh" onClick={handleSave} disabled={!dirty||syncStatus!=="idle"} title="Save" style={{width:32,height:32,borderRadius:8,border:`1px solid ${dirty&&syncStatus==="idle"?"rgba(52,211,153,0.3)":"rgba(255,255,255,0.05)"}`,background:dirty&&syncStatus==="idle"?"rgba(52,211,153,0.08)":"transparent",color:dirty&&syncStatus==="idle"?"#34D399":"rgba(255,255,255,0.2)",cursor:dirty&&syncStatus==="idle"?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>
          {syncStatus==="saving"?<span style={{width:10,height:10,border:"2px solid rgba(255,255,255,0.2)",borderTopColor:"#A78BFA",borderRadius:"50%",display:"inline-block",animation:"spin 0.6s linear infinite"}}/>:"💾"}
        </button>

        <div style={{position:"relative"}}>
          {settingsMenuOpen&&<div style={{position:"fixed",inset:0,zIndex:5}} onClick={()=>setSettingsMenuOpen(false)}/>}
          <button className="bh" onClick={()=>setSettingsMenuOpen(p=>!p)} title="Settings" style={{width:32,height:32,borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.5)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>⚙</button>
          {settingsMenuOpen&&<div style={{position:"absolute",top:"calc(100% + 6px)",right:0,zIndex:10,background:"#111420",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,boxShadow:"0 16px 40px rgba(0,0,0,0.6)",overflow:"hidden",minWidth:145}}>
            <button className="bh" onClick={()=>{setSettingsMenuOpen(false);setModal("weeks");}} style={{display:"block",width:"100%",padding:"9px 14px",border:"none",background:"transparent",color:"rgba(255,255,255,0.65)",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer",textAlign:"left"}}>📅 Weeks</button>
            <div style={{height:1,background:"rgba(255,255,255,0.05)"}}/>
            <button className="bh" onClick={()=>{setSettingsMenuOpen(false);setModal("slots");}} style={{display:"block",width:"100%",padding:"9px 14px",border:"none",background:"transparent",color:"rgba(255,255,255,0.65)",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer",textAlign:"left"}}>⏱ Slots</button>
            {(checked[activeDay]?.size||0)>0&&<><div style={{height:1,background:"rgba(255,255,255,0.05)"}}/>
            <button className="bh" onClick={async()=>{setSettingsMenuOpen(false);setChecked(p=>({...p,[activeDay]:new Set()}));setSyncStatus("saving");try{await store.set(checkedKey(weekIdx,activeDay),"[]");setSyncStatus("idle");}catch{setSyncStatus("error");}}} style={{display:"block",width:"100%",padding:"9px 14px",border:"none",background:"transparent",color:"rgba(239,68,68,0.7)",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer",textAlign:"left"}}>✕ Reset Day</button></>}
            <div style={{height:1,background:"rgba(255,255,255,0.05)"}}/>
            <button className="bh" onClick={()=>{setSettingsMenuOpen(false);localStorage.removeItem(AUTH_KEY);location.reload();}} style={{display:"block",width:"100%",padding:"9px 14px",border:"none",background:"transparent",color:"rgba(255,255,255,0.35)",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer",textAlign:"left"}}>🔒 Lock</button>
          </div>}
        </div>
      </div>
    </div>

    {view==="week"&&(
      <div style={{maxWidth:900,margin:"18px auto 0",padding:"0 20px",display:"flex",flexDirection:"column",gap:10}}>
        {DAYS.map(d=>{
          const pct=dayPct(d),isToday=isCurrentWeek&&d===todayDay,dt=getDayTasks(d);
          return <div key={d} onClick={()=>{setActiveDay(d);setView("day");}} style={{background:"rgba(255,255,255,0.025)",border:`1px solid ${pct===100?"rgba(52,211,153,0.2)":isToday?"rgba(96,165,250,0.2)":"rgba(255,255,255,0.07)"}`,borderRadius:14,padding:"14px 16px",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontWeight:700,fontSize:16}}>{DAY_FULL[d]}</span>
                {isToday&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"#34D399",background:"#34D39918",padding:"2px 8px",borderRadius:99}}>TODAY</span>}
                {pct===100&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"#34D399",background:"#34D39918",padding:"2px 8px",borderRadius:99}}>DONE ✓</span>}
              </div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:pct===100?"#34D399":"rgba(255,255,255,0.38)"}}>{checked[d]?.size||0}/{dt.length} · {pct}%</span>
            </div>
            <ProgressBar pct={pct} height={5}/>
          </div>;
        })}
      </div>
    )}

    {view==="day"&&(
      <div style={{maxWidth:900,margin:"18px auto 0",padding:"0 20px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <span style={{fontWeight:800,fontSize:22,letterSpacing:"-0.025em"}}>{DAY_FULL[activeDay]}</span>
          {isCurrentWeek&&activeDay===todayDay&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"#34D399",background:"#34D39918",padding:"2px 9px",borderRadius:99}}>TODAY</span>}
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"rgba(255,255,255,0.3)",marginLeft:"auto"}}>{checked[activeDay]?.size||0}/{activeTasks.length}</span>
        </div>
        <ProgressBar pct={activePct} height={6}/>

        {loading?<div style={{textAlign:"center",padding:"48px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:"rgba(255,255,255,0.2)"}}>Loading from cloud…</div>
        :activeTasks.length===0?<div style={{textAlign:"center",padding:"48px 0"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:"rgba(255,255,255,0.2)",marginBottom:12}}>No tasks for {DAY_FULL[activeDay]}</div>
            <button onClick={()=>setModal("newDayTask")} style={{padding:"8px 18px",borderRadius:9,background:"rgba(251,146,60,0.1)",border:"1px solid rgba(251,146,60,0.22)",color:"#FB923C",fontFamily:"Outfit",fontWeight:600,fontSize:13,cursor:"pointer"}}>+ Add task for today</button>
          </div>
        :<div style={{display:"flex",flexDirection:"column",gap:10,marginTop:14}}>
          {taskGroups.map(([time,tasks])=>{
            const allDone=tasks.every(t=>checked[activeDay]?.has(t.id));
            return <div key={time} style={{borderRadius:13,overflow:"hidden",border:`1px solid ${allDone?"rgba(52,211,153,0.2)":"rgba(255,255,255,0.06)"}`}}>
              <div style={{padding:"6px 14px",background:allDone?"rgba(52,211,153,0.06)":"rgba(255,255,255,0.02)",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:allDone?"#34D399":"rgba(255,255,255,0.32)",flex:1}}>{time}</span>
                {allDone&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8.5,color:"#34D399",background:"#34D39914",padding:"1px 7px",borderRadius:99}}>DONE ✓</span>}
              </div>
              <div style={{background:"rgba(0,0,0,0.15)"}}>
                {tasks.map(t=>{
                  const dayOnly=isDayOnlyAdded(t);
                  return <TaskPill key={t.id} t={t} checked={checked[activeDay]?.has(t.id)||false}
                    onToggle={()=>toggle(activeDay,t.id)} isDayOnly={dayOnly}
                    onEdit={()=>setModal(dayOnly?{editDayTask:t}:{editRepeatingTask:t})}/>;
                })}
              </div>
            </div>;
          })}
        </div>}

        {activePct===100&&!loading&&activeTasks.length>0&&(
          <div style={{marginTop:16,padding:"14px 18px",borderRadius:14,background:"rgba(52,211,153,0.06)",border:"1px solid rgba(52,211,153,0.2)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>🎉</span>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:"#34D399"}}>Day complete!</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:1}}>All {activeTasks.length} tasks done</div>
              </div>
            </div>
            <button className="bh" onClick={()=>setModal("export")} style={{padding:"7px 14px",borderRadius:9,background:"rgba(52,211,153,0.12)",border:"1px solid rgba(52,211,153,0.25)",color:"#34D399",fontFamily:"Outfit",fontWeight:600,fontSize:13,cursor:"pointer"}}>⬇ Export</button>
          </div>
        )}

        {!loading&&<div style={{marginTop:16}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"rgba(255,255,255,0.3)",letterSpacing:"0.1em",marginBottom:7}}>DAY NOTES</div>
          <textarea value={notes[activeDay]||""} onChange={e=>handleNotes(activeDay,e.target.value)} placeholder="Add notes — blockers, follow-ups, observations…" style={{width:"100%",minHeight:90,padding:"11px 13px",background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,color:"#EFEFEF",fontFamily:"Outfit",fontSize:13.5,lineHeight:1.6,resize:"vertical",outline:"none"}}/>
        </div>}
      </div>
    )}

    {modal==="export"&&<ExportModal weekIdx={weekIdx} day={activeDay} tasks={activeTasks} checkedSet={checked[activeDay]||new Set()} notes={notes[activeDay]||""} onClose={()=>setModal(null)}/>}
    {modal==="slots"&&<SlotsModal slots={timeSlots} onSave={handleSaveSlots} onClose={()=>setModal(null)}/>}
    {modal==="weeks"&&<WeeksModal weeks={ALL_WEEKS} weekIdx={weekIdx} onAddWeek={handleAddWeek} onRemoveWeek={handleRemoveWeek} onClose={()=>setModal(null)}/>}
    {modal==="newTask"&&<TaskModal allSlots={timeSlots} onSave={handleSaveTask} onDelete={handleDeleteTask} onClose={()=>setModal(null)}/>}
    {modal==="newDayTask"&&<DayTaskModal allSlots={timeSlots} day={activeDay} onSave={handleSaveDayTask} onClose={()=>setModal(null)}/>}
    {modal?.editRepeatingTask&&<DayOverridePanel task={modal.editRepeatingTask} allSlots={timeSlots} override={ov} onRemoveTask={handleToggleRemoveTask} onChangeSlot={handleDaySlotChange} onEditTemplate={()=>setModal({editTaskTemplate:modal.editRepeatingTask})} onReschedule={()=>setModal({rescheduleTask:modal.editRepeatingTask})} onClose={()=>setModal(null)}/>}
    {modal?.rescheduleTask&&<RescheduleModal task={modal.rescheduleTask} currentWeekIdx={weekIdx} currentDay={activeDay} onReschedule={handleRescheduleTask} onClose={()=>setModal(null)}/>}
    {modal?.editTaskTemplate&&<TaskModal editTask={modal.editTaskTemplate} allSlots={timeSlots} onSave={handleSaveTask} onDelete={handleDeleteTask} onClose={()=>setModal(null)}/>}
    {modal?.editDayTask&&<DayTaskModal editTask={modal.editDayTask} allSlots={timeSlots} day={activeDay} onSave={handleEditDayTask} onReschedule={()=>setModal({rescheduleDayTask:modal.editDayTask})} onClose={()=>setModal(null)}/>}
    {modal?.rescheduleDayTask&&<RescheduleModal task={modal.rescheduleDayTask} currentWeekIdx={weekIdx} currentDay={activeDay} onReschedule={handleRescheduleDayTask} onClose={()=>setModal(null)}/>}
  </div>;
}

function Root(){
  const [unlocked,setUnlocked]=useState(()=>localStorage.getItem(AUTH_KEY)==="1");
  if(!unlocked) return <LoginScreen onUnlock={()=>setUnlocked(true)}/>;
  return <App/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
