// ── FIRESTORE STORE ──
// All data lives under a single document per key in the "tracker" collection.
const store = {
  get: async (key) => {
    try {
      const doc = await db.collection("tracker").doc(key).get();
      return doc.exists ? doc.data().value : null;
    } catch(e) { console.warn("store.get error", key, e); return null; }
  },
  set: async (key, val) => {
    try {
      await db.collection("tracker").doc(key).set({ value: val });
    } catch(e) { console.warn("store.set error", key, e); }
  },
  // Subscribe to real-time updates for a key
  subscribe: (key, callback) => {
    return db.collection("tracker").doc(key).onSnapshot(doc => {
      callback(doc.exists ? doc.data().value : null);
    });
  }
};

function taskAppearsOnDay(t,day){
  if(t.freq==="custom") return (t.customDays||[]).includes(day);
  return (FREQ_DAYS[t.freq]||DAYS).includes(day);
}
function extractStartTime(slotStr){
  if(!slotStr) return slotStr;
  const dash=slotStr.indexOf("–");
  if(dash===-1) return slotStr.trim();
  const left=slotStr.slice(0,dash).trim();
  const right=slotStr.slice(dash+1).trim();
  if(!/[aApP][mM]/.test(left)){
    const ampm=right.match(/[aApP][mM]/)?.[0]||"";
    const lh=parseInt(left.split(":")[0]),rh=parseInt(right.split(":")[0]);
    if(ampm==="PM"&&lh!==12&&(rh===12||lh>rh)) return left+" AM";
    return left+" "+ampm;
  }
  return left;
}
function generateWeeks(startDate,endDate){
  const weeks=[];
  let cursor=new Date(startDate); cursor.setHours(0,0,0,0);
  const end=new Date(endDate); end.setHours(23,59,59,999);
  while(cursor<=end){
    const mon=new Date(cursor); mon.setDate(mon.getDate()+1);
    const fri=new Date(cursor); fri.setDate(fri.getDate()+5);
    const fmt=d=>d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    weeks.push({label:`${fmt(mon)} – ${fmt(fri)}`,startSunday:new Date(cursor),mon:new Date(mon)});
    cursor.setDate(cursor.getDate()+7);
  }
  return weeks;
}

function getTodayDayName(){ return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()]; }
function getCurrentWeekIdx(){

  }

}

function buildDayTasks(allTasks,day,override){
  const base=allTasks.filter(t=>taskAppearsOnDay(t,day));
  const removed=new Set(override?.removed||[]);

  const result=base.filter(t=>!removed.has(t.id)).map(t=>slotOverrides[t.id]?{...t,time:slotOverrides[t.id]}:t);
  return [...result,...(override?.added||[])];
}

function buildCSV(weekIdx,day,tasks,checkedSet,notes){
  const week=ALL_WEEKS[weekIdx];
  const dayDate=new Date(week.mon); dayDate.setDate(dayDate.getDate()+DAYS.indexOf(day));
  const dateStr=dayDate.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  const q=v=>`"${String(v).replace(/"/g,'""')}"`;
  const done=tasks.filter(t=>checkedSet.has(t.id)).length;
  const rows=[
    [q("Day"),q(DAY_FULL[day])].join(","),
    [q("Date"),q(dateStr)].join(","),
    [q("Week of"),q(week.label)].join(","),
    [q("Completion"),q(`${done} of ${tasks.length} (${Math.round(done/tasks.length*100)}%)`)].join(","),
    ",",[q("Start Time"),q("Task"),q("Completed")].join(","),
  ];
  const seen={},groups=[];
  tasks.forEach(t=>{if(!seen[t.time]){seen[t.time]=true;groups.push(t.time);}});
  groups.forEach(time=>{
    const start=extractStartTime(time);
    tasks.filter(t=>t.time===time).forEach((t,i)=>{
      rows.push([i===0?q(start):q(""),q(t.label),q(checkedSet.has(t.id)?"TRUE":"FALSE")].join(","));
    });
  });
  if(notes?.trim()) rows.push(",",[q("Notes"),q(notes.trim()),q("")].join(","));
  return rows.join("\r\n");
}
function buildTxt(weekIdx,day,tasks,checkedSet,notes){
  const week=ALL_WEEKS[weekIdx];
  const dayDate=new Date(week.mon); dayDate.setDate(dayDate.getDate()+DAYS.indexOf(day));
  const dateStr=dayDate.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  const done=tasks.filter(t=>checkedSet.has(t.id)).length;
  const pct=Math.round(done/tasks.length*100);
  const HR="─".repeat(52);
  const seen={},groups=[];
  tasks.forEach(t=>{if(!seen[t.time]){seen[t.time]=true;groups.push(t.time);}});
  const lines=["CORNERSTONE HEALING CENTER — PHOENIX OUTPATIENT","IAR Lead · Daily Summary",HR,
    `Date:         ${dateStr}`,`Week:         ${week.label}`,
    `Completion:   ${done} of ${tasks.length} tasks  (${pct}%)`,
    `Exported:     ${new Date().toLocaleString("en-US")}`,HR,""];
  groups.forEach(time=>{
    lines.push(`  ${time}`);
    tasks.filter(t=>t.time===time).forEach(t=>lines.push(`    [${checkedSet.has(t.id)?"✓":" "}]  ${t.label}`));
    lines.push("");
  });
  if(notes?.trim()) lines.push(HR,"NOTES","",notes.trim(),"");
  lines.push(HR,"Generated by Mason's Operations Tracker");
  return lines.join("\n");
}

async function getGoogleToken(){
  return new Promise((resolve,reject)=>{
    if(!window.google?.accounts?.oauth2){reject(new Error("Google sign-in library not loaded yet."));return;}
    const client=window.google.accounts.oauth2.initTokenClient({
      client_id:GAPI_CLIENT_ID,scope:GAPI_SCOPE,
      callback:(resp)=>resp.error?reject(new Error(resp.error)):resolve(resp.access_token),
    });
    client.requestAccessToken({prompt:""});
  });
}
async function uploadToDrive(content,filename,mime,folderId,token){
  const meta={name:filename,...(folderId?{parents:[folderId]}:{})};
  const boundary="boundary_mase_export";
  const body=[`--${boundary}`,"Content-Type: application/json; charset=UTF-8","",
    JSON.stringify(meta),"",`--${boundary}`,`Content-Type: ${mime}`,"",content,"",`--${boundary}--`].join("\r\n");
  const resp=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":`multipart/related; boundary=${boundary}`},body});
  if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||"Upload failed");}
  return resp.json();
}

function SlotsModal({slots,onSave,onClose}){
  const [list,setList]=useState([...slots]);
  const [newSlot,setNewSlot]=useState("");

  const [editVal,setEditVal]=useState("");
  const addSlot=()=>{ const v=newSlot.trim(); if(!v||list.includes(v)) return; setList(p=>[...p,v]); setNewSlot(""); };
  const remove=i=>setList(p=>p.filter((_,j)=>j!==i));
  const startEdit=i=>{setEditIdx(i);setEditVal(list[i]);};
  const commitEdit=()=>{ const v=editVal.trim(); if(!v) return; setList(p=>p.map((s,i)=>i===editIdx?v:s)); setEditIdx(null); };
  return <Modal title="Manage time slots" subtitle="TIME SLOTS" onClose={onClose} maxWidth={420}>

          {editIdx===i?<>
            <input style={{...IS,flex:1,padding:"5px 9px"}} value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&commitEdit()} autoFocus/>
            <button onClick={commitEdit} style={{padding:"4px 10px",borderRadius:7,background:"rgba(96,165,250,0.15)",border:"1px solid rgba(96,165,250,0.3)",color:"#93C5FD",cursor:"pointer",fontFamily:"Outfit",fontSize:12,fontWeight:600}}>Save</button>

            <button onClick={()=>startEdit(i)} style={{padding:"3px 9px",borderRadius:7,background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontFamily:"Outfit",fontSize:11}}>Edit</button>

function ExportModal({weekIdx,day,tasks,checkedSet,notes,driveFolder,onClose}){
  const [fmt,setFmt]=useState("csv");
  const [copied,setCopied]=useState(false);
  const [downloaded,setDownloaded]=useState(false);
  const [dlState,setDlState]=useState("idle");
  const [errorMsg,setErrorMsg]=useState("");
  const [uploadedLink,setUploadedLink]=useState(null);
  const week=ALL_WEEKS[weekIdx];
  const dayDate=new Date(week.mon); dayDate.setDate(dayDate.getDate()+DAYS.indexOf(day));
  const fileBase=`mason_${day.toLowerCase()}_${dayDate.toISOString().slice(0,10)}`;
  const done=tasks.filter(t=>checkedSet.has(t.id)).length;
  const pct=tasks.length?Math.round(done/tasks.length*100):0;
  const content=fmt==="csv"?buildCSV(weekIdx,day,tasks,checkedSet,notes):buildTxt(weekIdx,day,tasks,checkedSet,notes);
  const filename=`${fileBase}.${fmt}`;
  const mime=fmt==="csv"?"text/csv":"text/plain";
  const handleDownload=()=>{
    const blob=new Blob([content],{type:mime});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
    setDownloaded(true);
    setTimeout(()=>setDownloaded(false),2500);
  };
  const handleUpload=async()=>{
    setDlState("authing"); setErrorMsg(""); setUploadedLink(null);
    try{
      const token=await getGoogleToken();
      setDlState("uploading");
      const file=await uploadToDrive(content,filename,mime,driveFolder?.folderId||null,token);
      setUploadedLink(`https://drive.google.com/file/d/${file.id}/view`);
      setDlState("done");
    }catch(e){ setErrorMsg(e.message||"Unknown error"); setDlState("error"); }
  };
  const handleCopy=()=>{navigator.clipboard.writeText(content).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});};
  const uploadLabel=dlState==="authing"?"Connecting…":dlState==="uploading"?"Uploading…":dlState==="done"?"✓ Uploaded!":driveFolder?`Upload to ${driveFolder.name}`:"Upload to Drive";
  const uploadBg=dlState==="done"?"linear-gradient(135deg,#065f46,#34D399)":dlState==="error"?"linear-gradient(135deg,#7f1d1d,#ef4444)":"linear-gradient(135deg,#1D4ED8,#3B82F6)";
  return <Modal title={`Export — ${DAY_FULL[day]}`} subtitle="EXPORT DAY SUMMARY" onClose={onClose} maxWidth={480}>
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"rgba(255,255,255,0.3)"}}>COMPLETION</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:pct===100?"#34D399":pct>=50?"#60A5FA":"#F472B6"}}>{pct}%  ·  {done}/{tasks.length}</span>
      </div>
      <ProgressBar pct={pct}/>
    </div>
    <FormRow label="FORMAT">
      <div style={{display:"flex",gap:8}}>
        {[["csv","Spreadsheet (.csv)"],["txt","Plain text (.txt)"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFmt(v)} style={{flex:1,padding:"9px 10px",borderRadius:9,border:`1px solid ${fmt===v?"#60A5FA":"rgba(255,255,255,0.08)"}`,background:fmt===v?"rgba(96,165,250,0.1)":"rgba(255,255,255,0.02)",color:fmt===v?"#93C5FD":"rgba(255,255,255,0.38)",fontFamily:"Outfit",fontWeight:600,fontSize:13,cursor:"pointer"}}>{l}</button>
        ))}
      </div>
      {fmt==="csv"&&<div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:6}}>Columns: Start Time · Task · Completed (TRUE/FALSE)</div>}
    </FormRow>
    <div style={{background:"rgba(0,0,0,0.4)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:9,padding:"10px 13px",maxHeight:100,overflowY:"auto",marginBottom:14}}>
      <pre style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"rgba(255,255,255,0.35)",lineHeight:1.65,whiteSpace:"pre-wrap",wordBreak:"break-word",margin:0}}>{content.slice(0,380)}…</pre>
    </div>
    {driveFolder&&<div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:9,background:"rgba(96,165,250,0.06)",border:"1px solid rgba(96,165,250,0.15)",marginBottom:12}}>
      <span style={{fontSize:15}}>📁</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontFamily:"Outfit",fontWeight:600,fontSize:12.5,color:"#93C5FD",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{driveFolder.name}</div>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"rgba(255,255,255,0.3)"}}>{driveFolder.folderId?`ID: ${driveFolder.folderId.slice(0,20)}…`:"No folder ID"}</div>
      </div>
      {uploadedLink&&<a href={uploadedLink} target="_blank" rel="noopener noreferrer" style={{padding:"5px 12px",borderRadius:7,background:"rgba(52,211,153,0.12)",border:"1px solid rgba(52,211,153,0.25)",color:"#34D399",fontFamily:"Outfit",fontWeight:600,fontSize:12,textDecoration:"none",flexShrink:0}}>View file ↗</a>}
    </div>}
    {dlState==="error"&&<div style={{padding:"9px 13px",borderRadius:9,background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",marginBottom:12,fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#FCA5A5"}}>{errorMsg}</div>}
    <div style={{display:"flex",gap:9}}>
      <button onClick={handleCopy} style={{flex:1,padding:"11px 0",borderRadius:10,border:`1px solid ${copied?"rgba(52,211,153,0.35)":"rgba(255,255,255,0.1)"}`,background:copied?"rgba(52,211,153,0.1)":"rgba(255,255,255,0.03)",color:copied?"#34D399":"rgba(255,255,255,0.55)",fontFamily:"Outfit",fontWeight:600,fontSize:13,cursor:"pointer"}}>{copied?"✓ Copied!":"Copy"}</button>
      <button onClick={handleDownload} style={{flex:1,padding:"11px 0",borderRadius:10,border:`1px solid ${downloaded?"rgba(52,211,153,0.35)":"rgba(96,165,250,0.25)"}`,background:downloaded?"rgba(52,211,153,0.1)":"rgba(96,165,250,0.08)",color:downloaded?"#34D399":"#93C5FD",fontFamily:"Outfit",fontWeight:600,fontSize:13,cursor:"pointer"}}>{downloaded?"✓ Saved!":"⬇ Download"}</button>
      <button onClick={handleUpload} disabled={["authing","uploading"].includes(dlState)}
        style={{flex:1.6,padding:"11px 0",borderRadius:10,border:"none",background:uploadBg,color:"#fff",fontFamily:"Outfit",fontWeight:700,fontSize:13,cursor:["authing","uploading"].includes(dlState)?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7,transition:"background 0.3s"}}>
        {["authing","uploading"].includes(dlState)&&<span style={{width:14,height:14,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",borderRadius:"50%",display:"inline-block",animation:"spin 0.7s linear infinite"}}/>}
        {uploadLabel}
      </button>
    </div>
  </Modal>;
}

  return <Modal title="Manage weeks" subtitle="WEEKS" onClose={onClose} maxWidth={520}>
    <div style={{display:"flex",gap:8,marginBottom:14}}>
      <button onClick={()=>onAddWeek("before")} style={{flex:1,padding:"9px 0",borderRadius:9,border:"1px solid rgba(96,165,250,0.3)",background:"rgba(96,165,250,0.07)",color:"#93C5FD",fontFamily:"Outfit",fontWeight:600,fontSize:13,cursor:"pointer"}}>← Add week before</button>
      <button onClick={()=>onAddWeek("end")} style={{flex:1,padding:"9px 0",borderRadius:9,border:"1px solid rgba(52,211,153,0.3)",background:"rgba(52,211,153,0.07)",color:"#34D399",fontFamily:"Outfit",fontWeight:600,fontSize:13,cursor:"pointer"}}>Add week after →</button>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:360,overflowY:"auto",marginBottom:14}}>
      {weeks.map((w,i)=>{
        const isCur=i===getCurrentWeekIdx(),isSel=i===weekIdx,canRemove=(i===0||i===weeks.length-1)&&weeks.length>1;
        return <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:10,background:isSel?"rgba(96,165,250,0.08)":"rgba(255,255,255,0.02)",border:`1px solid ${isSel?"rgba(96,165,250,0.25)":isCur?"rgba(52,211,153,0.2)":"rgba(255,255,255,0.06)"}`}}>
          <div style={{flex:1,display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:isSel?"#93C5FD":isCur?"#34D399":"rgba(255,255,255,0.45)"}}>{w.label}</span>
            {isCur&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8.5,color:"#34D399",background:"#34D39914",padding:"1px 6px",borderRadius:99}}>CURRENT</span>}
            {isSel&&!isCur&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8.5,color:"#93C5FD",background:"rgba(96,165,250,0.1)",padding:"1px 6px",borderRadius:99}}>VIEWING</span>}
          </div>
          {canRemove&&(confirm?.wi===i
            ?<div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"rgba(255,255,255,0.35)"}}>Remove?</span>
                <button onClick={()=>{onRemoveWeek(i);setConfirm(null);}} style={{padding:"3px 10px",borderRadius:7,background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.3)",color:"#FCA5A5",cursor:"pointer",fontFamily:"Outfit",fontSize:11,fontWeight:700}}>Yes</button>
                <button onClick={()=>setConfirm(null)} style={{padding:"3px 10px",borderRadius:7,background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontFamily:"Outfit",fontSize:11}}>No</button>
              </div>
            :<button onClick={()=>setConfirm({wi:i})} style={{padding:"3px 10px",borderRadius:7,background:"transparent",border:"1px solid rgba(239,68,68,0.2)",color:"#FCA5A5",cursor:"pointer",fontFamily:"Outfit",fontSize:11}}>Remove</button>
          )}
        </div>;
      })}
    </div>
    <button onClick={onClose} style={{width:"100%",padding:"9px 0",borderRadius:9,cursor:"pointer",border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"rgba(255,255,255,0.35)",fontFamily:"Outfit",fontWeight:600,fontSize:14}}>Done</button>
  </Modal>;
}

// ── MAIN APP ──
function App(){
  const [weekIdx,setWeekIdx]=useState(0);
  const [weeksReady,setWeeksReady]=useState(false);
  const [weekRange,setWeekRange]=useState(null);
  const [activeDay,setActiveDay]=useState(()=>{const d=getTodayDayName();return DAYS.includes(d)?d:"Mon";});
  const [allTasks,setAllTasks]=useState(DEFAULT_TASKS);
  const [timeSlots,setTimeSlots]=useState(DEFAULT_TIME_SLOTS);
  const [driveFolder,setDriveFolder]=useState(null);
  const [overrides,setOverrides]=useState({});
  const [checked,setChecked]=useState({Mon:new Set(),Tue:new Set(),Wed:new Set(),Thu:new Set(),Fri:new Set()});
  const [notes,setNotes]=useState({Mon:"",Tue:"",Wed:"",Thu:"",Fri:""});
  const [loading,setLoading]=useState(true);
  const [dirty,setDirty]=useState(false);
  const [syncStatus,setSyncStatus]=useState("idle");
  const [modal,setModal]=useState(null);
  const [view,setView]=useState("day");
  const todayDay=getTodayDayName();
  const isCurrentWeek=weekIdx===getCurrentWeekIdx();
  const omKey=(wi,d)=>`${wi}_${d}`;

  // ── WEEK RANGE INIT (once) ──
  useEffect(()=>{
    async function loadRange(){
      try{
        const raw=await store.get(WEEK_RANGE_KEY);
        let range=null;
        if(raw) try{const r=JSON.parse(raw);range={start:new Date(r.start),end:new Date(r.end)};}catch{}
        if(!range){
          range=getDefaultWeekRange();
          await store.set(WEEK_RANGE_KEY,JSON.stringify({start:range.start.toISOString(),end:range.end.toISOString()}));
        }
        ALL_WEEKS.length=0;
        generateWeeks(range.start,range.end).forEach(w=>ALL_WEEKS.push(w));
        setWeekRange(range);
        const ci=getCurrentWeekIdx();
        setWeekIdx(ci>=0?ci:0);
      }catch(e){
        console.error(e);
        const range=getDefaultWeekRange();
        ALL_WEEKS.length=0;
        generateWeeks(range.start,range.end).forEach(w=>ALL_WEEKS.push(w));
        setWeekRange(range);
        setWeekIdx(0);
      }
      setWeeksReady(true);
    }
    loadRange();
  },[]);

  // ── PER-WEEK DATA LOAD (on weekIdx change) ──
  useEffect(()=>{
    if(!weeksReady) return;
    async function init(){
      setLoading(true);
      try{
        const [rawSlots,rawDrive]=await Promise.all([store.get(SLOTS_KEY),store.get(DRIVE_KEY)]);
        if(rawSlots) try{setTimeSlots(JSON.parse(rawSlots));}catch{}
        if(rawDrive&&rawDrive!=="null") try{setDriveFolder(JSON.parse(rawDrive));}catch{}

        // Load tasks for this week; if none exist, copy from previous week or use defaults
        const rawTasks=await store.get(tasksKey(weekIdx));
        if(rawTasks){ try{setAllTasks(JSON.parse(rawTasks));}catch{} }
        else{
          let base=DEFAULT_TASKS;
          if(weekIdx>0){ const prev=await store.get(tasksKey(weekIdx-1)); if(prev) try{base=JSON.parse(prev);}catch{} }
          setAllTasks(base);
          await store.set(tasksKey(weekIdx),JSON.stringify(base));
        }

        // Load checked / notes / overrides for this week
        const nc={},nn={},nov={};
        for(const d of DAYS){
          const [rawC,rawN,rawOv]=await Promise.all([
            store.get(checkedKey(weekIdx,d)),
            store.get(notesKey(weekIdx,d)),
            store.get(overrideKey(weekIdx,d))
          ]);
          nc[d]=new Set(rawC?JSON.parse(rawC):[]);
          nn[d]=rawN||"";
          if(rawOv) try{nov[omKey(weekIdx,d)]=JSON.parse(rawOv);}catch{}
        }
        setChecked(nc); setNotes(nn); setOverrides(nov);
        setDirty(false);
      }catch(e){ console.error(e); setSyncStatus("error"); }
      finally{ setLoading(false); }
    }
    init();
  },[weekIdx,weeksReady]);

  const getOv=(wi,d)=>overrides[omKey(wi,d)]||{removed:[],added:[],slotOverrides:{}};
  const updateOv=(wi,d,updater)=>{
    const prev=getOv(wi,d),next=updater(prev),key=omKey(wi,d);
    setOverrides(p=>({...p,[key]:next}));
    setDirty(true);
  };

  const toggle=useCallback((day,id)=>{
    const s=new Set(checked[day]); s.has(id)?s.delete(id):s.add(id);
    const next={...checked,[day]:s};
    setChecked(next);
    setDirty(true);
  },[checked]);

  const handleNotes=(day,text)=>{
    setNotes(p=>({...p,[day]:text}));
    setDirty(true);
  };

  // Task save/delete with scope support — updates local state only, marks dirty
  const applyTasksLocally=(startWi,endWi,updater)=>{
    if(startWi<=weekIdx&&weekIdx<=endWi){
      const next=updater(allTasks);
      setAllTasks(next);
    }
    setDirty(true);
  };

  const handleSaveTask=(t,scope)=>{
    const updater=tasks=>tasks.find(x=>x.id===t.id)?tasks.map(x=>x.id===t.id?t:x):[...tasks,t];
    const startWi=scope==="all"?0:weekIdx;
    const endWi=scope==="this"?weekIdx:ALL_WEEKS.length-1;
    applyTasksLocally(startWi,endWi,updater);
    if(!timeSlots.includes(t.time)){
      const ns=[...timeSlots,t.time]; setTimeSlots(ns);
      setDirty(true);
    }
    setModal(null);
  };

  const handleDeleteTask=(id,scope)=>{
    const updater=tasks=>tasks.filter(x=>x.id!==id);
    const startWi=scope==="all"?0:weekIdx;
    const endWi=scope==="this"?weekIdx:ALL_WEEKS.length-1;
    applyTasksLocally(startWi,endWi,updater);
    setModal(null);
  };

  const handleSaveDayTask=t=>{
    updateOv(weekIdx,activeDay,prev=>({...prev,added:[...(prev.added||[]).filter(x=>x.id!==t.id),t]}));
    if(!timeSlots.includes(t.time)){
      const ns=[...timeSlots,t.time]; setTimeSlots(ns);
      setDirty(true);
    }
    setModal(null);
  };
  const handleEditDayTask=t=>{ updateOv(weekIdx,activeDay,prev=>({...prev,added:(prev.added||[]).map(x=>x.id===t.id?t:x)})); setModal(null); };
  const handleToggleRemoveTask=taskId=>{ updateOv(weekIdx,activeDay,prev=>{const r=prev.removed||[];return{...prev,removed:r.includes(taskId)?r.filter(x=>x!==taskId):[...r,taskId]};}); setModal(null); };
  const handleDaySlotChange=(taskId,newSlot)=>{
    updateOv(weekIdx,activeDay,prev=>({...prev,slotOverrides:{...(prev.slotOverrides||{}),[taskId]:newSlot}}));
    if(!timeSlots.includes(newSlot)){
      const ns=[...timeSlots,newSlot]; setTimeSlots(ns);
      setDirty(true);
    }
    setModal(null);
  };
  const handleSaveSlots=list=>{ setTimeSlots(list); setDirty(true); setModal(null); };
  const handleSaveDrive=folder=>{ setDriveFolder(folder); setDirty(true); setModal(null); };

  const handleRefresh=async()=>{
    setSyncStatus("loading");
    try{
      const [rawSlots,rawDrive]=await Promise.all([store.get(SLOTS_KEY),store.get(DRIVE_KEY)]);
      if(rawSlots) try{setTimeSlots(JSON.parse(rawSlots));}catch{}
      if(rawDrive&&rawDrive!=="null") try{setDriveFolder(JSON.parse(rawDrive));}catch{}

      const rawTasks=await store.get(tasksKey(weekIdx));
      if(rawTasks) try{setAllTasks(JSON.parse(rawTasks));}catch{}

      const nc={},nn={},nov={};
      for(const d of DAYS){
        const [rawC,rawN,rawOv]=await Promise.all([
          store.get(checkedKey(weekIdx,d)),
          store.get(notesKey(weekIdx,d)),
          store.get(overrideKey(weekIdx,d))
        ]);
        nc[d]=new Set(rawC?JSON.parse(rawC):[]);
        nn[d]=rawN||"";
        if(rawOv) try{nov[omKey(weekIdx,d)]=JSON.parse(rawOv);}catch{}
      }
      setChecked(nc); setNotes(nn); setOverrides(nov);
      setDirty(false);
      setSyncStatus("idle");
    }catch(e){
      console.error(e);
      setSyncStatus("error");
    }
  };

  const handleSave=async()=>{
    setSyncStatus("saving");
    try{
      await store.set(SLOTS_KEY,JSON.stringify(timeSlots));
      await store.set(DRIVE_KEY,driveFolder?JSON.stringify(driveFolder):"null");
      await store.set(tasksKey(weekIdx),JSON.stringify(allTasks));
      for(const d of DAYS){
        await store.set(checkedKey(weekIdx,d),JSON.stringify([...checked[d]]));
        await store.set(notesKey(weekIdx,d),notes[d]||"");
        const ov=overrides[omKey(weekIdx,d)];
        if(ov) await store.set(overrideKey(weekIdx,d),JSON.stringify(ov));
      }
      setDirty(false);
      setSyncStatus("idle");
    }catch(e){
      console.error(e);
      setSyncStatus("error");
    }
  };

  const handleAddWeek=async(position)=>{
    setSyncStatus("loading");
    try{
      let newRange;
      if(position==="end"){
        const lastSun=ALL_WEEKS[ALL_WEEKS.length-1].startSunday;
        const nextSun=addWeeks(lastSun,1);
        newRange={start:weekRange.start,end:nextSun};
      } else {
        const firstSun=ALL_WEEKS[0].startSunday;
        const prevSun=addWeeks(firstSun,-1);
        newRange={start:prevSun,end:weekRange.end};
      }
      await store.set(WEEK_RANGE_KEY,JSON.stringify({start:newRange.start.toISOString(),end:newRange.end.toISOString()}));
      ALL_WEEKS.length=0;
      generateWeeks(newRange.start,newRange.end).forEach(w=>ALL_WEEKS.push(w));
      setWeekRange({...newRange});
      // Preload the new week's tasks from the adjacent week
      if(position==="end"){
        const newWi=ALL_WEEKS.length-1;
        const prev=await store.get(tasksKey(newWi-1));
        const base=prev?JSON.parse(prev):DEFAULT_TASKS;
        await store.set(tasksKey(newWi),JSON.stringify(base));
      } else {
        const prev=await store.get(tasksKey(1));
        const base=prev?JSON.parse(prev):DEFAULT_TASKS;
        await store.set(tasksKey(0),JSON.stringify(base));
        setWeekIdx(wi=>wi+1);
      }
      setSyncStatus("idle");
    }catch(e){
      console.error(e);
      setSyncStatus("error");
    }
    setModal(null);
  };

  const handleRemoveWeek=async(wi)=>{
    if(ALL_WEEKS.length<=1) return;
    setSyncStatus("loading");
    try{
      let newRange;
      if(wi===ALL_WEEKS.length-1){
        const prevSun=ALL_WEEKS[wi-1].startSunday;
        newRange={start:weekRange.start,end:prevSun};
      } else {
        const nextSun=ALL_WEEKS[1].startSunday;
        newRange={start:nextSun,end:weekRange.end};
      }
      await store.set(WEEK_RANGE_KEY,JSON.stringify({start:newRange.start.toISOString(),end:newRange.end.toISOString()}));
      ALL_WEEKS.length=0;
      generateWeeks(newRange.start,newRange.end).forEach(w=>ALL_WEEKS.push(w));
      setWeekRange({...newRange});
      setWeekIdx(cur=>Math.min(cur,ALL_WEEKS.length-1));
      setSyncStatus("idle");
    }catch(e){
      console.error(e);
      setSyncStatus("error");
    }
    setModal(null);
  };

  const getDayTasks=d=>buildDayTasks(allTasks,d,getOv(weekIdx,d));
  const activeTasks=getDayTasks(activeDay);
  const ov=getOv(weekIdx,activeDay);
  const dayPct=d=>{const t=getDayTasks(d);return t.length?Math.round((checked[d]?.size||0)/t.length*100):0;};
  const weekPct=Math.round(DAYS.reduce((s,d)=>s+dayPct(d),0)/DAYS.length);
  const totalWeekTasks=DAYS.reduce((s,d)=>s+getDayTasks(d).length,0);
  const completedWeekTasks=DAYS.reduce((s,d)=>s+(checked[d]?.size||0),0);
  const daysCompleted=DAYS.filter(d=>dayPct(d)===100).length;
  const timeGroups=(()=>{const g={};activeTasks.forEach(t=>{(g[t.time]||(g[t.time]=[])).push(t);});return Object.entries(g).sort(([a],[b])=>timeSlots.indexOf(a)-timeSlots.indexOf(b));})();
  const activePct=dayPct(activeDay);
  const isDayOnlyAdded=t=>(ov.added||[]).some(x=>x.id===t.id);

  return <div style={{minHeight:"100vh",background:"#0A0C12",backgroundImage:"radial-gradient(ellipse 80% 50% at 50% -10%, rgba(30,58,138,0.35) 0%, transparent 60%)",color:"#F0F0F0",fontFamily:"Outfit",paddingBottom:80}}>

    <div style={{maxWidth:900,margin:"0 auto",padding:"28px 20px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:16,flexWrap:"wrap"}}>
        <div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"#60A5FA",letterSpacing:"0.14em",marginBottom:7,opacity:0.8}}>CORNERSTONE HEALING CENTER · PHX OUTPATIENT</div>
          <h1 style={{fontSize:26,fontWeight:900,letterSpacing:"-0.03em",lineHeight:1.15,color:"#fff"}}>
            Mason's <span style={{background:"linear-gradient(90deg,#60A5FA,#A78BFA)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Operations Tracker</span>
          </h1>
          <div style={{marginTop:6,display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:"rgba(255,255,255,0.3)"}}>IAR Lead · Week of {ALL_WEEKS[weekIdx]?.label}</span>
            <SyncDot status={syncStatus} dirty={dirty}/>
          </div>
        </div>
        <ProgressRing pct={weekPct} size={72} stroke={5} color="#60A5FA" label="WEEK AVG"/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginTop:22}}>
        {[
          {label:"TASKS DONE",value:`${completedWeekTasks}`,sub:`of ${totalWeekTasks} this week`,color:"#60A5FA",icon:"✅"},
          {label:"WEEK PROGRESS",value:`${weekPct}%`,sub:`${daysCompleted} of 5 days complete`,color:weekPct===100?"#34D399":"#A78BFA",icon:"📈"},
          {label:"TODAY",value:isCurrentWeek&&DAYS.includes(todayDay)?`${dayPct(todayDay)}%`:"—",sub:isCurrentWeek&&DAYS.includes(todayDay)?`${checked[todayDay]?.size||0}/${getDayTasks(todayDay).length} tasks`:"off day",color:"#34D399",icon:"🎯"},
        ].map(c=>(
          <div key={c.label} style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"14px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:"0.1em"}}>{c.label}</div>
              <span style={{fontSize:14}}>{c.icon}</span>
            </div>
            <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:26,color:c.color,letterSpacing:"-0.03em",lineHeight:1}}>{c.value}</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"rgba(255,255,255,0.28)",marginTop:4}}>{c.sub}</div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:5,marginTop:16,overflowX:"auto",paddingBottom:3}}>
        {ALL_WEEKS.map((w,i)=>{
          const isCur=getCurrentWeekIdx()===i,isSel=i===weekIdx;
          return <button key={i} className="bh" onClick={()=>setWeekIdx(i)} style={{padding:"5px 12px",borderRadius:99,flexShrink:0,border:`1px solid ${isSel?"rgba(96,165,250,0.5)":"rgba(255,255,255,0.07)"}`,background:isSel?"rgba(96,165,250,0.12)":"transparent",color:isSel?"#93C5FD":"rgba(255,255,255,0.32)",fontFamily:"'JetBrains Mono',monospace",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
            {isCur&&<span style={{width:6,height:6,borderRadius:"50%",background:"#34D399",animation:"pulse 2s infinite"}}/>}
            {w.label}
          </button>;
        })}
      </div>
    </div>

    <div style={{maxWidth:900,margin:"18px auto 0",padding:"0 20px"}}>
      <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
        {[["day","Day View"],["week","Week Overview"]].map(([v,l])=>(
          <button key={v} className="bh" onClick={()=>setView(v)} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${view===v?"rgba(96,165,250,0.4)":"rgba(255,255,255,0.07)"}`,background:view===v?"rgba(96,165,250,0.1)":"transparent",color:view===v?"#93C5FD":"rgba(255,255,255,0.32)",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer"}}>{l}</button>
        ))}
        <div style={{flex:1}}/>
        <button className="bh" onClick={handleRefresh} disabled={syncStatus!=="idle"} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${syncStatus!=="idle"?"rgba(255,255,255,0.05)":"rgba(96,165,250,0.2)"}`,background:syncStatus!=="idle"?"transparent":"rgba(96,165,250,0.08)",color:syncStatus!=="idle"?"rgba(255,255,255,0.25)":"#93C5FD",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:syncStatus!=="idle"?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:4}}>
          {syncStatus==="loading"&&<span style={{width:10,height:10,border:"2px solid rgba(255,255,255,0.2)",borderTopColor:"#FCD34D",borderRadius:"50%",display:"inline-block",animation:"spin 0.6s linear infinite"}}/>}
          🔄 Refresh
        </button>
        <button className="bh" onClick={handleSave} disabled={!dirty||syncStatus!=="idle"} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${dirty&&syncStatus==="idle"?"rgba(52,211,153,0.3)":"rgba(255,255,255,0.05)"}`,background:dirty&&syncStatus==="idle"?"rgba(52,211,153,0.08)":"transparent",color:dirty&&syncStatus==="idle"?"#34D399":"rgba(255,255,255,0.25)",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:dirty&&syncStatus==="idle"?"pointer":"not-allowed",display:"flex",alignItems:"center",gap:4}}>
          {syncStatus==="saving"&&<span style={{width:10,height:10,border:"2px solid rgba(255,255,255,0.2)",borderTopColor:"#A78BFA",borderRadius:"50%",display:"inline-block",animation:"spin 0.6s linear infinite"}}/>}
          💾 Save
        </button>
        <button className="bh" onClick={()=>setModal("weeks")} style={{padding:"6px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.07)",background:"transparent",color:"rgba(255,255,255,0.32)",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer"}}>📅 Weeks</button>
        <button className="bh" onClick={()=>setModal("slots")} style={{padding:"6px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.07)",background:"transparent",color:"rgba(255,255,255,0.32)",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer"}}>⏱ Slots</button>
        <button className="bh" onClick={()=>setModal("drive")} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${driveFolder?"rgba(96,165,250,0.3)":"rgba(255,255,255,0.07)"}`,background:driveFolder?"rgba(96,165,250,0.08)":"transparent",color:driveFolder?"#93C5FD":"rgba(255,255,255,0.32)",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
          📁 {driveFolder?driveFolder.name:"Drive Folder"}
        </button>
      </div>

      <div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:4}}>
        {DAYS.map(d=>{
          const pct=dayPct(d),isToday=isCurrentWeek&&d===todayDay,isActive=d===activeDay;
          const ov2=getOv(weekIdx,d);
          const hasOv=((ov2.removed||[]).length>0||(ov2.added||[]).length>0||Object.keys(ov2.slotOverrides||{}).length>0);
          return <button key={d} className="bh" onClick={()=>{setActiveDay(d);setView("day");}} style={{flex:1,padding:"10px 4px 8px",borderRadius:10,border:"none",cursor:"pointer",background:isActive?"rgba(96,165,250,0.12)":"transparent",outline:isActive?"1px solid rgba(96,165,250,0.25)":"none",opacity:isActive?1:0.45,position:"relative"}}>
            {hasOv&&<span style={{position:"absolute",top:6,right:8,width:5,height:5,borderRadius:"50%",background:"#FB923C"}}/>}
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                {isToday&&<span style={{width:6,height:6,borderRadius:"50%",background:"#34D399",animation:"pulse 2s infinite"}}/>}
                <span style={{fontFamily:"Outfit",fontWeight:700,fontSize:13,color:isActive?"#93C5FD":"#CCC"}}>{d}</span>
              </div>
              <ProgressBar pct={pct} height={3}/>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:pct===100?"#34D399":"rgba(255,255,255,0.28)"}}>{pct}%</span>
            </div>
          </button>;
        })}
      </div>
    </div>

    {view==="week"&&(
      <div style={{maxWidth:900,margin:"18px auto 0",padding:"0 20px",display:"flex",flexDirection:"column",gap:10}}>
        {DAYS.map(d=>{
          const pct=dayPct(d),isToday=isCurrentWeek&&d===todayDay,dt=getDayTasks(d);
          return <div key={d} onClick={()=>{setActiveDay(d);setView("day");}} style={{background:"rgba(255,255,255,0.025)",border:`1px solid ${pct===100?"rgba(52,211,153,0.2)":isToday?"rgba(96,165,250,0.2)":"rgba(255,255,255,0.07)"}`,borderRadius:14,padding:"14px 16px",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontWeight:700,fontSize:16}}>{DAY_FULL[d]}</span>
                {isToday&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"#34D399",background:"#34D39918",padding:"2px 8px",borderRadius:99}}>TODAY</span>}
                {pct===100&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"#34D399",background:"#34D39918",padding:"2px 8px",borderRadius:99}}>DONE ✓</span>}
              </div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:pct===100?"#34D399":"rgba(255,255,255,0.38)"}}>{checked[d]?.size||0}/{dt.length} · {pct}%</span>
            </div>
            <ProgressBar pct={pct} height={5}/>
          </div>;
        })}
      </div>
    )}

    {view==="day"&&(
      <div style={{maxWidth:900,margin:"18px auto 0",padding:"0 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontWeight:800,fontSize:22,letterSpacing:"-0.025em"}}>{DAY_FULL[activeDay]}</span>
            {isCurrentWeek&&activeDay===todayDay&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"#34D399",background:"#34D39918",padding:"2px 9px",borderRadius:99}}>TODAY</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"rgba(255,255,255,0.3)"}}>{checked[activeDay]?.size||0}/{activeTasks.length}</span>
            <button className="bh" onClick={()=>setModal("newDayTask")} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:8,background:"rgba(251,146,60,0.1)",border:"1px solid rgba(251,146,60,0.22)",color:"#FB923C",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer"}}>+ Today Only</button>
            <button className="bh" onClick={()=>setModal("newTask")} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:8,background:"rgba(52,211,153,0.1)",border:"1px solid rgba(52,211,153,0.22)",color:"#34D399",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer"}}>+ Repeating</button>
            <button className="bh" onClick={()=>setModal("export")} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:8,background:"rgba(96,165,250,0.1)",border:"1px solid rgba(96,165,250,0.22)",color:"#93C5FD",fontFamily:"Outfit",fontWeight:600,fontSize:12,cursor:"pointer"}}>⬇ Export</button>
            {(checked[activeDay]?.size||0)>0&&<button className="bh" onClick={async()=>{setChecked(p=>({...p,[activeDay]:new Set()}));setSyncing();try{await store.set(checkedKey(weekIdx,activeDay),"[]");setSynced();}catch{setErr();}}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"rgba(255,255,255,0.25)",fontFamily:"Outfit",fontWeight:500,fontSize:12,cursor:"pointer"}}>Reset</button>}
          </div>
        </div>
        <ProgressBar pct={activePct} height={6}/>

        {loading?<div style={{textAlign:"center",padding:"48px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:"rgba(255,255,255,0.2)"}}>Loading from cloud…</div>
        :activeTasks.length===0?<div style={{textAlign:"center",padding:"48px 0"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:"rgba(255,255,255,0.2)",marginBottom:12}}>No tasks for {DAY_FULL[activeDay]}</div>
            <button onClick={()=>setModal("newDayTask")} style={{padding:"8px 18px",borderRadius:9,background:"rgba(251,146,60,0.1)",border:"1px solid rgba(251,146,60,0.22)",color:"#FB923C",fontFamily:"Outfit",fontWeight:600,fontSize:13,cursor:"pointer"}}>+ Add task for today</button>
          </div>
        :<div style={{display:"flex",flexDirection:"column",gap:10,marginTop:14}}>
          {timeGroups.map(([time,tasks])=>{
            const allDone=tasks.every(t=>checked[activeDay]?.has(t.id));
            return <div key={time} style={{borderRadius:13,overflow:"hidden",border:`1px solid ${allDone?"rgba(52,211,153,0.2)":"rgba(255,255,255,0.06)"}`}}>
              <div style={{padding:"6px 14px",background:allDone?"rgba(52,211,153,0.06)":"rgba(255,255,255,0.02)",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:allDone?"#34D399":"rgba(255,255,255,0.32)",flex:1}}>{time}</span>
                {allDone&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8.5,color:"#34D399",background:"#34D39914",padding:"1px 7px",borderRadius:99}}>DONE ✓</span>}
              </div>
              <div style={{background:"rgba(0,0,0,0.15)"}}>
                {tasks.map(t=>{
                  const dayOnly=isDayOnlyAdded(t);
                  return <TaskPill key={t.id} t={t} checked={checked[activeDay]?.has(t.id)||false}
                    onToggle={()=>toggle(activeDay,t.id)} isDayOnly={dayOnly}
                    onEdit={()=>setModal(dayOnly?{editDayTask:t}:{editRepeatingTask:t})}/>;
                })}
              </div>
            </div>;
          })}
        </div>}

        {activePct===100&&!loading&&activeTasks.length>0&&(
          <div style={{marginTop:16,padding:"14px 18px",borderRadius:14,background:"rgba(52,211,153,0.06)",border:"1px solid rgba(52,211,153,0.2)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>🎉</span>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:"#34D399"}}>Day complete!</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:1}}>All {activeTasks.length} tasks done</div>
              </div>
            </div>
            <button className="bh" onClick={()=>setModal("export")} style={{padding:"7px 14px",borderRadius:9,background:"rgba(52,211,153,0.12)",border:"1px solid rgba(52,211,153,0.25)",color:"#34D399",fontFamily:"Outfit",fontWeight:600,fontSize:13,cursor:"pointer"}}>⬇ Export</button>
          </div>
        )}

        {!loading&&<div style={{marginTop:16}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:"rgba(255,255,255,0.3)",letterSpacing:"0.1em",marginBottom:7}}>DAY NOTES</div>
          <textarea value={notes[activeDay]||""} onChange={e=>handleNotes(activeDay,e.target.value)} placeholder="Add notes — blockers, follow-ups, observations…" style={{width:"100%",minHeight:90,padding:"11px 13px",background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,color:"#EFEFEF",fontFamily:"Outfit",fontSize:13.5,lineHeight:1.6,resize:"vertical",outline:"none"}}/>
        </div>}
      </div>
    )}

    {modal==="export"&&<ExportModal weekIdx={weekIdx} day={activeDay} tasks={activeTasks} checkedSet={checked[activeDay]||new Set()} notes={notes[activeDay]||""} driveFolder={driveFolder} onClose={()=>setModal(null)}/>}
    {modal==="slots"&&<SlotsModal slots={timeSlots} onSave={handleSaveSlots} onClose={()=>setModal(null)}/>}
    {modal==="weeks"&&<WeeksModal weeks={ALL_WEEKS} weekIdx={weekIdx} onAddWeek={handleAddWeek} onRemoveWeek={handleRemoveWeek} onClose={()=>setModal(null)}/>}
    {modal==="drive"&&<DriveFolderModal currentFolder={driveFolder} onSave={handleSaveDrive} onClose={()=>setModal(null)}/>}
    {modal==="newTask"&&<TaskModal allSlots={timeSlots} onSave={handleSaveTask} onDelete={handleDeleteTask} onClose={()=>setModal(null)}/>}
    {modal==="newDayTask"&&<DayTaskModal allSlots={timeSlots} day={activeDay} onSave={handleSaveDayTask} onClose={()=>setModal(null)}/>}
    {modal?.editRepeatingTask&&<DayOverridePanel task={modal.editRepeatingTask} allSlots={timeSlots} override={ov} onRemoveTask={handleToggleRemoveTask} onChangeSlot={handleDaySlotChange} onEditTemplate={()=>setModal({editTaskTemplate:modal.editRepeatingTask})} onClose={()=>setModal(null)}/>}
    {modal?.editTaskTemplate&&<TaskModal editTask={modal.editTaskTemplate} allSlots={timeSlots} onSave={handleSaveTask} onDelete={handleDeleteTask} onClose={()=>setModal(null)}/>}
    {modal?.editDayTask&&<DayTaskModal editTask={modal.editDayTask} allSlots={timeSlots} day={activeDay} onSave={handleEditDayTask} onClose={()=>setModal(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
